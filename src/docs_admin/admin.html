          ${canTagBatch?`<button id="batchTagModeBtn" style="white-space:nowrap;font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid;cursor:pointer;${batchTagMode?'background:#fffbeb;border-color:#fde68a;color:#92400e;font-weight:600;':'background:#f9fafb;border-color:#d1d5db;color:#374151;'}">🏷️ 批量打标签</button>`:''}
        </div>
        <div id="treeManage" class="tree" style="flex:1;overflow-y:auto;min-height:0;"></div>
        ${canTagBatch&&batchTagMode?`
        <div id="batchTagPanel" style="flex-shrink:0;margin-top:0;border-top:2px solid #fde68a;padding:10px 10px 8px;background:#fffbeb;">
          <div style="font-size:12px;font-weight:600;color:#92400e;margin-bottom:8px;">🏷️ 批量打标签 — 已选 <span id="batchCheckedCount">${batchChecked.length}</span> 个节点</div>
          <div style="margin-bottom:6px;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">从标签库选择：</div>
            <div id="batchTagLibrary" style="display:flex;flex-wrap:wrap;gap:4px;">${(state.tagCatalog||[]).map(t=>`<label style="font-size:12px;display:inline-flex;align-items:center;gap:3px;background:#fff;border:1px solid #fde68a;border-radius:4px;padding:2px 6px;cursor:pointer;"><input type="checkbox" class="btag-lib-cb" value="${esc(t)}" style="margin:0;"/>${esc(t)}</label>`).join('')||'<span class="muted" style="font-size:12px;">暂无标签库，请在下方新建</span>'}</div>
          </div>
          <div style="margin-bottom:8px;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:3px;">新建标签（逗号分隔）：</div>
            <input id="batchTagNewInput" type="text" style="width:100%;box-sizing:border-box;font-size:12px;" placeholder="标签1, 标签2"/>
          </div>
          <div style="display:flex;gap:6px;justify-content:flex-end;">
            <button id="batchTagCancelBtn" style="font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;">取消</button>
            <button id="batchTagRemoveBtn" style="font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #fca5a5;background:#fff;color:#b91c1c;cursor:pointer;">批量移除</button>
            <button id="batchTagConfirmBtn" class="btn-primary" style="font-size:12px;">确认打标</button>
          </div>
        </div>`:`
        <div id="treeNodeBtns" style="flex-shrink:0;padding-top:8px;border-top:1px solid var(--line);">
          ${canStructure?`<div class="row" style="flex-wrap:wrap;gap:4px;">
            <button id="addSiblingBtn" style="font-size:12px;">新增同级</button>
            <button id="addChildBtn" style="font-size:12px;">新增子级</button>
            <button id="renameBtn" class="btn-ghost" style="font-size:12px;">重命名</button>
            <button id="deleteBtn" class="btn-danger" style="font-size:12px;">删除节点</button>
            ${isAdmin()?`<button id="resetTreeBtn" class="btn-ghost" style="font-size:12px;">重置目录</button>`:''}
          </div>
          <div class="muted" style="font-size:11px;margin-top:4px;">仅三级结构；三级节点不可新增子级。</div>`
          :'<div class="muted" style="font-size:11px;">目录结构调整由管理员操作。</div>'}
        </div>`}
      </article>
      <article id="treeRight" style="overflow-y:auto;"></article>
    </div>`;
  renderTreeLeft();
  updateRightPanel();
}

function renderTreeLeft(){
  const treeManage=document.getElementById('treeManage');
  if(!treeManage)return;
  const _role=getEffectiveRole();
  const _isWorker=_role==='product_editor';
  const _viewIds=_isWorker?getViewableNodeIds():null;
  const _disabledIds=_viewIds?new Set(state.nodes.filter(n=>!_viewIds.has(n.id)).map(n=>n.id)):new Set();
  const searchVal=document.getElementById('treeSearch')?.value.trim().toLowerCase()||'';
  const treeOpts={search:searchVal,selectable:!batchTagMode,selectedId:selectedNodeId,showCheckbox:batchTagMode,checkedIds:batchChecked,showTags:true,disabledIds:_disabledIds};
  treeManage.innerHTML=renderTreeHtml(state.tree,treeOpts);
  if(batchTagMode){
    bindTree(treeManage,{onToggle:onTreeToggle,onCheck:onTreeCheck});
    if(batchChecked.length){
      syncIndeterminate(treeManage,state.tree,new Set(batchChecked));
      batchChecked=[...treeManage.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
    }
  }else{
    bindTree(treeManage,{onSelect:id=>{
      // For out-of-scope nodes, show lock in right panel
      if(_disabledIds.has(id)){
        selectedNodeId=id;
        const right=document.getElementById('treeRight');
        if(right)right.innerHTML=`<div class="lock" style="margin-top:20px;">🔒 <strong>无权限</strong><br><span style="color:var(--muted);font-size:12px;margin-top:4px;display:block;">此节点不在您的权限范围内。如需访问，请前往「权限申请」提交申请。</span></div>`;
        return;
      }
      onTreeSelect(id);
    },onToggle:onTreeToggle});
  }

  const treeSearch=document.getElementById('treeSearch');
  if(treeSearch)treeSearch.addEventListener('input',()=>{
    const sv=treeSearch.value.trim().toLowerCase();
    treeManage.innerHTML=renderTreeHtml(state.tree,{...treeOpts,search:sv});
    if(batchTagMode){bindTree(treeManage,{onToggle:onTreeToggle,onCheck:onTreeCheck});}
    else{bindTree(treeManage,{onSelect:id=>{
      if(_disabledIds.has(id)){selectedNodeId=id;const right=document.getElementById('treeRight');if(right)right.innerHTML=`<div class="lock" style="margin-top:20px;">🔒 <strong>无权限</strong><br><span style="color:var(--muted);font-size:12px;margin-top:4px;display:block;">此节点不在您的权限范围内。</span></div>`;return;}
      onTreeSelect(id);
    },onToggle:onTreeToggle});}
    if(batchChecked.length){
      syncIndeterminate(treeManage,state.tree,new Set(batchChecked));
      batchChecked=[...treeManage.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
    }
  });

  // Batch-tag mode button
  document.getElementById('batchTagModeBtn')?.addEventListener('click',()=>{
    batchTagMode=!batchTagMode;
    if(!batchTagMode)batchChecked=[];
    renderTreePanel();
  });
  // Batch-tag panel buttons
  document.getElementById('batchTagCancelBtn')?.addEventListener('click',()=>{batchTagMode=false;batchChecked=[];renderTreePanel();});
  document.getElementById('batchTagConfirmBtn')?.addEventListener('click',()=>commitBatchTags('add'));
  document.getElementById('batchTagRemoveBtn')?.addEventListener('click',()=>commitBatchTags('remove'));

  if(!batchTagMode){
    const node=state.nodeMap[selectedNodeId];
    const addChildBtn=document.getElementById('addChildBtn');
    const addSiblingBtn=document.getElementById('addSiblingBtn');
    if(addChildBtn)addChildBtn.disabled=!node||node.level>=3;
    // Non-admin: can add sibling only if parent node is also within their permission scope
    if(addSiblingBtn&&!isAdmin()&&node){
      const parentId=node.parentId||'';
      const canSib=parentId&&canAction(state.currentUser.id,'edit_structure',parentId);
      addSiblingBtn.disabled=!canSib;
      if(!canSib)addSiblingBtn.title='您的权限从该节点开始，无法新增同级节点';
    }
    document.getElementById('addSiblingBtn')?.addEventListener('click',()=>addNode('sibling'));
    document.getElementById('addChildBtn')?.addEventListener('click',()=>addNode('child'));
    document.getElementById('renameBtn')?.addEventListener('click',renameNode);
    document.getElementById('deleteBtn')?.addEventListener('click',deleteNode);
    document.getElementById('resetTreeBtn')?.addEventListener('click',resetTreeFromStaticData);
  }
}

function commitBatchTags(mode){
  if(!requireField(batchChecked.length>0,document.getElementById('batchTagNewInput'),'请先勾选节点'))return;
  const fromLib=[...document.querySelectorAll('.btag-lib-cb:checked')].map(i=>i.value);
  const fromNew=(document.getElementById('batchTagNewInput')?.value||'').split(/[\n,，]/).map(s=>s.trim()).filter(Boolean);
  const tags=[...new Set([...fromLib,...fromNew])];
  if(!requireField(tags.length>0,document.getElementById('batchTagNewInput'),'请选择或输入标签'))return;
  // Add new tags to catalog
  if(mode==='add'&&fromNew.length){const tc=[...new Set([...(state.tagCatalog||[]),...fromNew])];writeStore(STORE.tagCatalog,tc);state.tagCatalog=tc;}
  // Apply to checked nodes
  const nm=readStore(STORE.nodeMeta,{});
  batchChecked.forEach(id=>{
    const m=nm[id]||{};const cur=Array.isArray(m.tags)?m.tags:[];
    nm[id]={...m,tags:mode==='add'?[...new Set([...cur,...tags])]:cur.filter(t=>!tags.includes(t))};
  });
  writeStore(STORE.nodeMeta,nm);state.nodeMeta=nm;
  const affectedCount=batchChecked.length;
  refreshState();
  batchTagMode=false;batchChecked=[];
  renderTreePanel();
  showToast(`已${mode==='add'?'添加':'移除'}标签 [${tags.join(', ')}] ${mode==='add'?'到':'从'} ${affectedCount} 个节点`,'ok');
}

// Only updates the right article — no tree re-render
function updateRightPanel(){
  const right=document.getElementById('treeRight');
  if(!right)return;
  const node=state.nodeMap[selectedNodeId];
  if(!node){
    const _r=getEffectiveRole();
    const _viewIds=_r==='product_editor'?getViewableNodeIds():null;
    const noScope=_viewIds&&_viewIds.size===0;
    right.innerHTML=noScope
      ?'<div class="lock" style="margin-top:20px;">🔒 <strong>暂无任何节点权限</strong><br><span style="color:var(--muted);font-size:12px;margin-top:4px;display:block;">请前往「权限申请」提交申请，或联系管理员授权。</span></div>'
      :'<div class="muted" style="padding:20px;">请在左侧选择节点</div>';
    return;
  }
  const nodeIsLeaf=isTreeLeaf(state.tree,node.id);
  const nodeMeta=getNodeMeta(node.id);
  const prdData=getPrd(node.id);
  right.innerHTML=buildRightHtml(node,nodeIsLeaf,nodeMeta,prdData);
  bindRightEvents(node,nodeIsLeaf,nodeMeta,prdData);
}

function buildRightHtml(node,nodeIsLeaf,nodeMeta,prdData){
  // Role-based access checks
  const _role=getEffectiveRole();
  const _isAdmin=isAdmin();
  if(!_isAdmin&&!canAction(state.currentUser.id,'view',node.id)){
    return`<div class="lock" style="margin-top:20px;">🔒 <strong>无权限</strong><br><span style="color:var(--muted);font-size:12px;margin-top:4px;display:block;">此节点不在您的权限范围内，无法查看或编辑。</span></div>`;
  }
  const pub=nodeMeta.publishedLangs||[];
  const hasGen=!!(nodeMeta.helpContent&&nodeMeta.helpContent['zh-cn']);
  const hasPrd=!!prdData.content;
  const badge=pub.length?'background:#f0fdf4;color:#166534;border-color:#a7f3d0':hasGen?'background:#fffbeb;color:#92400e;border-color:#fde68a':hasPrd?'background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe':'background:#fafafa;color:#9ca3af;border-color:#e5e7eb';
  const badgeText=pub.length?`✅ 已发布 ${pub.length} 语言`:hasGen?'✏️ 已生成':hasPrd?'📋 PRD 已上传':'○ 未配置';
  let html=`<div class="card" style="margin-bottom:10px;"><div style="display:flex;align-items:center;justify-content:space-between;">
    <strong>${esc(node.title)}</strong>
    <span style="font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid;${badge}">${badgeText}</span>
  </div><div class="muted">ID: ${esc(node.id)}</div><div class="muted">${esc(node.pathText)}</div></div>`;

  if(!nodeIsLeaf){
    const tagHint=isAdmin()?'如需为节点打标签，请点击左侧"🏷️ 批量打标签"按钮。':'';
    html+=`<div class="muted" style="margin-bottom:10px;">📁 末级节点才可上传 PRD 与生成文档。${tagHint}</div>`;
    if(nodeMeta.tags&&nodeMeta.tags.length){
      html+=`<div style="margin-bottom:8px;font-size:12px;color:var(--muted);">当前标签：${renderTagChips(nodeMeta.tags||[],false)}</div>`;
    }
    return html;
  }

  // Leaf node: show tags read-only (managed via batch tag in tree panel)
  if(nodeMeta.tags&&nodeMeta.tags.length){
    html+=`<div style="margin-bottom:8px;font-size:12px;color:var(--muted);">🏷️ 标签：${renderTagChips(nodeMeta.tags||[],false)}</div>`;
  }
  // Workflow tabs — 6 steps, filtered by role
  const _tabRole=getEffectiveRole();
  const ALL_WF_TABS=[
    {id:'prd',      label:'① PRD上传',         roles:['admin','product_editor']},
    {id:'gen_zh',   label:'② 生成中文说明文档', roles:['admin','product_editor']},
    {id:'translate',label:'③ 多语言翻译',       roles:['admin','product_editor']},
    {id:'edit_trans',label:'④ 编辑多语言',      roles:['admin','product_editor']},
    {id:'publish',  label:'⑤ 发布部署',         roles:['admin','product_editor']}
  ];
  const visibleTabs=ALL_WF_TABS.filter(t=>t.roles.includes(_tabRole));
  if(!visibleTabs.some(t=>t.id===currentWfTab))currentWfTab=visibleTabs[0]?.id||'prd';
  const anyTrans=ALL_LANGS.some(l=>!l.source&&hasUsableTranslation(nodeMeta.helpContent,l.code));
  const doneMap={prd:hasPrd,gen_zh:hasGen,translate:anyTrans,edit_trans:anyTrans,publish:pub.length>0};
  html+=`<div class="wf-tabs">${visibleTabs.map(t=>{
    const active=currentWfTab===t.id;const done=doneMap[t.id]&&!active;
    return`<button class="wf-tab${active?' active':''}${done?' done':''}" data-wf="${esc(t.id)}">${esc(t.label)}</button>`;
  }).join('')}</div><div class="wf-panel" id="wfPanel">${buildWfHtml(node,nodeMeta,prdData)}</div>`;
  return html;
}

function buildWfHtml(node,nodeMeta,prdData){
  const hasPrd=!!prdData.content;
  const hasGen=!!(nodeMeta.helpContent&&nodeMeta.helpContent['zh-cn']);
  const pub=nodeMeta.publishedLangs||[];

  if(currentWfTab==='prd'){
    return`${hasPrd?`<div class="prd-badge">✅ PRD 已上传：${esc(prdData.filename||'prd.md')} · ${new Date(prdData.uploadedAt||Date.now()).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>`:''}
    <div class="prd-dropzone" id="prdDz"><div class="dz-icon">📄</div>
    <div class="dz-text">${hasPrd?'重新上传 PRD 文件':'拖拽 PRD 文件或点击上传'}</div>
    <div class="dz-sub">支持 .md / .txt / .docx / .pdf 格式（≤ 50 MB，提取后上限 50 万字），或直接粘贴</div>
    <input type="file" id="prdFile" style="display:none" accept=".md,.txt,.docx,.doc,.pdf"/></div>
    <div style="text-align:center;color:var(--muted);font-size:12px;margin:4px 0;">或直接粘贴 PRD 内容</div>
    <textarea id="prdText" rows="8" placeholder="将产品需求文档内容粘贴于此...">${esc(prdData.content||'')}</textarea>
    <div class="row" style="margin-top:8px;justify-content:flex-end;">
      <span id="prdChars" class="muted">${(prdData.content||'').length} 字符</span>
      <button id="savePrdBtn" class="btn-primary">保存 PRD</button>
    </div>`;
  }

  // ② 生成中文说明文档 (合并生成 + 编辑中文)
  if(currentWfTab==='gen_zh'){
    const apiOk=hasApiKey();
    const apiSettings=getApiSettings();
    const zhContent=(nodeMeta.helpContent||{})['zh-cn']||'';
    return`${!hasPrd?'<div class="muted" style="margin-bottom:8px;">⚠️ 请先完成「① PRD上传」。</div>':''}
    ${apiOk
      ?`<div style="background:#f0fdf4;border:1px solid #a7f3d0;border-radius:6px;padding:6px 12px;font-size:12px;color:#166534;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
          <span>🤖 <strong>Skill AI 已连接</strong>（${esc(apiSettings.model||'gpt-4o-mini')}）— Phase 4 将真实调用 LLM 按 SKILL 规范生成帮助文档</span>
          <button onclick="openApiModal()" style="font-size:11px;padding:2px 8px;border:1px solid #a7f3d0;border-radius:4px;background:#fff;color:#166534;cursor:pointer;">修改设置</button>
        </div>`
      :`<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:6px 12px;font-size:12px;color:#92400e;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
          <span>⚠️ 未配置 Skill API Key — Phase 4 将使用内置模板（非真实 AI）</span>
          <button onclick="openApiModal()" style="font-size:11px;padding:2px 8px;border:1px solid #fde68a;border-radius:4px;background:#fff;color:#92400e;cursor:pointer;">配置 API Key →</button>
        </div>`
    }
    <div class="row" style="margin-bottom:8px;flex-wrap:wrap;gap:8px;align-items:center;">
      <button id="startGenBtn" class="btn-primary" ${!hasPrd||pipelineRunning?'disabled':''}>
        ${pipelineRunning?'⏳ 生成中...':(hasGen?'🔄 重新生成':(apiOk?'🤖 调用 Skill AI 生成':'🚀 开始生成（模板）'))}
      </button>
      ${hasGen&&!pipelineRunning?`<span class="ok" style="font-size:12px;">✅ 已生成 · ${nodeMeta.contentVer?new Date(nodeMeta.contentVer).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):''}</span>`:''}
    </div>
    ${pipelineRunning
      ?`<div id="genStatusBox" style="padding:12px;border:1px solid #bfdbfe;border-radius:8px;background:#eff6ff;margin-bottom:8px;">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#1d4ed8;margin-bottom:8px;flex-wrap:wrap;">
            <span style="animation:pulse 1s ease-in-out infinite;font-size:16px;">⚙️</span>
            <strong>内容生成（AI）</strong>
            <span class="muted" style="font-size:11px;flex:1;">正在调用 Skill LLM 按规范生成帮助文档...</span>
            <button id="abortGenBtn" style="font-size:11px;padding:3px 10px;border-radius:5px;border:1px solid #fca5a5;background:#fff;color:#b91c1c;cursor:pointer;">⏹ 中止生成</button>
          </div>
          ${pipelineStreamText?`<div id="pipelineStreamEl" style="background:#0f172a;color:#a3e635;border-radius:6px;padding:10px;font-size:11px;font-family:monospace;max-height:160px;overflow-y:auto;white-space:pre-wrap;">${esc(pipelineStreamText)}</div>`:''}
        </div>`
      :(!hasPrd?'':!hasGen?'<div class="muted" style="font-size:12px;margin-bottom:8px;">点击「开始生成」将调用 <code>generate-help-content</code> Skill 的 Phase 4 生成中文文档。</div>':'')
    }
    ${hasGen&&!pipelineRunning?`<hr style="border:none;border-top:1px solid var(--line);margin:6px 0 8px;"/>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">✏️ 编辑中文帮助文档 Markdown 内容。保存后，已有的多语言翻译将被标记为需更新。</div>
      <textarea id="editArea" rows="15" style="font-family:monospace;font-size:12px;" placeholder="Markdown 格式的中文帮助文档...">${esc(zhContent)}</textarea>
      <div class="row" style="margin-top:6px;justify-content:flex-end;">
        <button id="saveContentBtn" class="btn-primary">保存中文内容</button>
      </div>`:''}`;
  }

  // ④ 编辑多语言 — only langs that have been through translation
  if(currentWfTab==='edit_trans'){
    const nonZhLangs=ALL_LANGS.filter(l=>!l.source);
    const translatedLangs=nonZhLangs.filter(l=>hasUsableTranslation(nodeMeta.helpContent||{},l.code));
    if(!translatedLangs.length)return`<div class="muted">⚠️ 尚未翻译任何语言。请先完成「③ 多语言翻译」。</div>`;
    const firstTranslated=translatedLangs[0];
    if(!editLang||editLang==='zh-cn'||!translatedLangs.some(l=>l.code===editLang))editLang=firstTranslated?.code||'zh-tw';
    const transContent=(nodeMeta.helpContent||{})[editLang]||'';
    const transVer=(nodeMeta.transVers||{})[editLang]||'';
    const isStaleEdit=!!(nodeMeta.helpContent||{})[editLang]&&nodeMeta.contentVer&&transVer&&transVer<nodeMeta.contentVer;
    const isManualEdit=!!(nodeMeta.manualEdits||{})[editLang];
    const staleWarn=isStaleEdit?`<div style="margin-bottom:6px;padding:6px 10px;border-radius:6px;font-size:11px;background:#fff7ed;border:1px solid #fdba74;color:#c2410c;">⚠️ 中文版本已更新（${new Date(nodeMeta.contentVer).toLocaleString('zh-CN')}），此译文基于旧版，建议先在「③ 多语言翻译」重新翻译。</div>`:'';
    const manualWarn=isManualEdit&&!isStaleEdit?`<div style="margin-bottom:6px;padding:6px 10px;border-radius:6px;font-size:11px;background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e;">✏️ 此译文已手动编辑，发布时将以此版本为准。</div>`:'';
    return`<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">仅已翻译的语言可编辑；灰色语言尚未完成翻译，请先前往「③ 多语言翻译」。</div>
    <div class="lang-edit-tabs">${nonZhLangs.map(l=>{
      const hasT=hasUsableTranslation(nodeMeta.helpContent||{},l.code);
      const active=editLang===l.code;
      const lStale=hasT&&nodeMeta.contentVer&&((nodeMeta.transVers||{})[l.code]||'')<nodeMeta.contentVer&&(nodeMeta.transVers||{})[l.code];
      if(!hasT){return`<button class="lang-edit-tab" disabled title="尚未翻译，请先在「③ 多语言翻译」完成" style="opacity:0.38;cursor:not-allowed;">${esc(l.code)}</button>`;}
      return`<button class="lang-edit-tab${active?' active':' has-c'}" data-el="${l.code}">${esc(l.code)}${lStale?'⚠':'✓'}</button>`;
    }).join('')}</div>
    ${staleWarn}${manualWarn}
    <textarea id="editArea" rows="15" style="font-family:monospace;font-size:12px;" placeholder="Markdown 格式的译文内容...">${esc(transContent)}</textarea>
    <div class="row" style="margin-top:6px;justify-content:flex-end;">
      <span class="muted" style="font-size:11px;">${isManualEdit?'✏️ 手动编辑':'译文版本'} · ${editLang}</span>
      <button id="saveContentBtn" class="btn-primary">保存译文</button>
    </div>`;
  }

  if(currentWfTab==='translate'){
    if(!hasGen)return'<div class="muted">⚠️ 请先完成「② 生成中文说明文档」。</div>';
    const running=transRunning[node.id];
    return`${running?`<div style="margin-bottom:8px;padding:7px 12px;border-radius:6px;font-size:12px;background:#fffbeb;border:1px solid #fde68a;color:#92400e;display:flex;align-items:center;justify-content:space-between;">
      <span>⏳ 翻译进行中，请勿切换节点...</span>
      <button id="abortTransBtn" class="btn-danger" style="font-size:11px;padding:3px 8px;">⏹ 中断翻译</button>
    </div>`:'<div style="margin-bottom:8px;padding:7px 12px;border-radius:6px;font-size:12px;background:#fffbeb;border:1px solid #fde68a;color:#92400e">📡 <strong>Google Translate</strong>（免费，需要网络）</div>'}
    ${transErrors[node.id]&&transErrors[node.id]!=='翻译已被中断'?`<div style="margin-bottom:8px;padding:8px;border:1px solid #fecaca;background:#fff1f2;border-radius:6px;font-size:12px;color:#b42318;">⚠️ ${esc(transErrors[node.id])}</div>`:''}
    ${(()=>{
      const staleCount=ALL_LANGS.filter(l=>!l.source&&hasUsableTranslation(nodeMeta.helpContent||{},l.code)&&nodeMeta.contentVer&&((nodeMeta.transVers||{})[l.code]||'')<nodeMeta.contentVer&&(nodeMeta.transVers||{})[l.code]).length;
      return staleCount?`<div style="margin-bottom:8px;padding:8px 12px;border-radius:6px;font-size:12px;background:#fff7ed;border:1px solid #fdba74;color:#92400e;display:flex;align-items:center;gap:8px;">⚠️ <span>中文内容已更新，<strong>${staleCount} 个</strong>已翻译语言基于旧版，建议重新翻译后再发布。</span></div>`:'';
    })()}
    ${nodeMeta.contentVer?`<div style="font-size:11px;color:#6b7280;margin-bottom:6px;">中文版本：${new Date(nodeMeta.contentVer).toLocaleString('zh-CN')}</div>`:''}
    <div class="tl-grid"><div class="tl-row" style="font-weight:600;font-size:11px;color:#475467"><span>语言</span><span>状态</span><span>操作</span></div>
    ${ALL_LANGS.map(l=>{
      const ready=hasUsableTranslation(nodeMeta.helpContent||{},l.code);const isRunning=running===l.code;
      const langErr=(transLangErrors[node.id]||{})[l.code]||'';
      // Staleness: translated before current contentVer?
      const transVer=(nodeMeta.transVers||{})[l.code]||'';
      const isStale=!l.source&&ready&&nodeMeta.contentVer&&transVer&&transVer<nodeMeta.contentVer;
      const isManual=!l.source&&(nodeMeta.manualEdits||{})[l.code];
      let badge=l.source?'<span class="tl-badge tl-source">源语言</span>'
        :isRunning?'<span class="tl-badge tl-running">翻译中...</span>'
        :langErr?`<span class="tl-badge" style="background:#fff1f2;color:#b42318;border-color:#fecaca;" title="${esc(langErr)}">✗ 失败</span>`
        :isStale?`<span class="tl-badge" style="background:#fff7ed;color:#c2410c;border-color:#fdba74;" title="中文已更新，建议重新翻译">⚠️ 需更新</span>`
        :ready?`<span class="tl-badge tl-done">✓ ${isManual?'已手动编辑':'已翻译'}</span>`
        :'<span class="tl-badge tl-pending">未翻译</span>';
      const actionBtn=l.source?'':isRunning
        ?`<button disabled class="btn-ok" style="font-size:11px;padding:3px 8px;">⏳ 翻译中</button>`
        :langErr
          ?`<button data-tl="${l.code}" class="btn-ok" style="font-size:11px;padding:3px 8px;border-color:#fca5a5;color:#b91c1c;" ${running?'disabled':''}>🔄 重试</button>`
          :isStale
            ?`<button data-tl="${l.code}" class="btn-ok" style="font-size:11px;padding:3px 8px;border-color:#fdba74;color:#c2410c;" ${running?'disabled':''}>🔄 重新翻译</button>`
            :`<button ${running?'disabled':''} data-tl="${l.code}" class="btn-ok" style="font-size:11px;padding:3px 8px;">🌐 翻译</button>`;
      return`<div class="tl-row"><div style="font-weight:600">${esc(l.code)}<br><span style="font-weight:400;font-size:10px;color:var(--muted)">${esc(l.label)}</span></div><div>${badge}</div><div>${actionBtn}</div></div>`;
    }).join('')}</div>
    <div class="row" style="justify-content:flex-end;margin-top:6px;">
      <button id="tlAllBtn" class="btn-primary" style="font-size:12px;" ${running?'disabled':''}>一键翻译所有语言</button>
    </div>`;
  }

  if(currentWfTab==='publish'){
    if(!hasGen)return'<div class="muted">⚠️ 请先完成「② 生成中文说明文档」。</div>';
    const parts=(node.pathText||node.title).split(' / ');
    const secSlug=(SECTION_SLUGS[parts[0]]||parts[0]).toLowerCase().replace(/\s+/g,'-');
    const itemSlug=(parts[parts.length-1]||node.title).toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'-');
    const staleTransLangs=ALL_LANGS.filter(l=>!l.source&&hasUsableTranslation(nodeMeta.helpContent||{},l.code)&&nodeMeta.contentVer&&((nodeMeta.transVers||{})[l.code]||'')<nodeMeta.contentVer&&(nodeMeta.transVers||{})[l.code]).map(l=>l.code);
    const staleWarnPub=staleTransLangs.length?`<div style="margin-bottom:8px;padding:7px 12px;border-radius:6px;font-size:11px;background:#fff7ed;border:1px solid #fdba74;color:#92400e;">⚠️ 以下语言译文基于旧版中文，建议先在「③ 多语言翻译」重新翻译后再发布：<strong>${staleTransLangs.join('、')}</strong></div>`:'';
    const manualChangedLangs=ALL_LANGS.filter(l=>!l.source&&pub.includes(l.code)&&(nodeMeta.manualEdits||{})[l.code]).map(l=>l.code);
    const manualChangedWarn=manualChangedLangs.length?`<div style="margin-bottom:8px;padding:7px 12px;border-radius:6px;font-size:11px;background:#f0f9ff;border:1px solid #bae6fd;color:#0c4a6e;display:flex;gap:6px;">✏️ <span>以下语言译文已手动编辑，点击「立即更新」发布新版本：<strong>${manualChangedLangs.join('、')}</strong></span></div>`:'';
    const _pubSelRow=`<div class="row" style="margin-bottom:6px;"><button id="pubToggleSelBtn" class="btn-ghost" style="font-size:11px;">全选</button></div>`;
    return`<p style="font-size:12px;color:var(--muted);margin:0 0 8px;">选择语言版本发布到对应域名路径，前台文档中心实时可见。</p>${staleWarnPub}${manualChangedWarn}${_pubSelRow}
    <div class="pub-grid">${ALL_LANGS.map(l=>{
      const ready=hasUsableTranslation(nodeMeta.helpContent||{},l.code);const isLive=pub.includes(l.code);
      const currentHash=ready?simpleHash((nodeMeta.helpContent||{})[l.code]||''):'';
      const publishedHash=(nodeMeta.pubVers||{})[l.code]||'';
      const contentChangedSincePub=isLive&&publishedHash&&currentHash&&publishedHash!==currentHash;
      const transStale=l.code!=='zh-cn'&&ready&&nodeMeta.contentVer&&((nodeMeta.transVers||{})[l.code]||'')<nodeMeta.contentVer&&(nodeMeta.transVers||{})[l.code];
      const manualEdited=!l.source&&(nodeMeta.manualEdits||{})[l.code];
      const freshLabel=contentChangedSincePub?'<span style="font-size:10px;color:#c2410c;margin-left:4px;">内容已变更</span>'
        :transStale?'<span style="font-size:10px;color:#d97706;margin-left:4px;">译文需更新</span>'
        :manualEdited&&isLive?'<span style="font-size:10px;color:#2563eb;margin-left:4px;">已手动编辑</span>'
        :'';
      const badge=isLive
        ?`<span class="pub-badge pub-live">${(contentChangedSincePub||manualEdited)?'⚠ 待更新':'● 已上线'}</span>`
        :ready?'<span class="pub-badge pub-draft">○ 草稿</span>':'<span class="pub-badge pub-none">- 无内容</span>';
      const defaultCheck=isLive||ready;
      const needsQuickPub=(contentChangedSincePub||(manualEdited&&isLive))&&!transStale;
      const quickPubBtn=needsQuickPub?`<button class="btn-ok pub-quick-btn" data-qp="${l.code}" style="font-size:11px;padding:3px 8px;white-space:nowrap;">立即更新</button>`:'';
      return`<div class="pub-row"><label><input type="checkbox" class="pub-cb" value="${l.code}"${defaultCheck?' checked':''}${!ready?' disabled':''}/> ${esc(l.label)}${freshLabel}${!ready?' <span class="muted">(未翻译)</span>':''}</label>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">${quickPubBtn}<span class="pub-url">wps.ai/${l.code}/docs/${secSlug}/${itemSlug}</span>${badge}</div></div>`;
    }).join('')}</div>
    ${pub.length?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">上次发布：${nodeMeta.publishedAt?new Date(nodeMeta.publishedAt).toLocaleString('zh-CN'):'-'}</div>`:''}
    <div class="row" style="justify-content:flex-end;">
      <button id="unpubBtn" class="btn-danger" style="font-size:12px;"${!pub.length?' disabled':''}>取消发布</button>
      <button id="pubBtn" class="btn-primary">🚀 立即发布</button>
    </div>
    <div id="deployLog" class="deploy-log" style="display:none"></div>`;
  }
  return '';
}

function buildPipelineHtml(curIdx){
  return PIPELINE_PHASES.map((ph,i)=>{
    let cls='phase-pending',icon='○';
    if(i<curIdx){cls='phase-done';icon='✓';}
    else if(i===curIdx){cls='phase-running';icon='▶';}
    return`<div class="pipeline-phase ${cls}"><div class="phase-icon">${icon}</div><div><div class="phase-name">${esc(ph.name)}</div><div class="phase-desc">${esc(ph.desc)}</div></div></div>`;
  }).join('');
}

// ===== BIND RIGHT PANEL EVENTS =====
function bindRightEvents(node,nodeIsLeaf,nodeMeta,prdData){
  if(!nodeIsLeaf){
    return;
  }

  // Workflow tab switching — always fetch FRESH data; lock during translation
  document.querySelectorAll('.wf-tab[data-wf]').forEach(b=>b.addEventListener('click',()=>{
    if(transRunning[node.id]){return;} // locked during translation
    currentWfTab=b.dataset.wf;
    refreshWfTabs(node.id);
    const wfPanel=document.getElementById('wfPanel');
    if(wfPanel){const nm=getNodeMeta(node.id);const pd=getPrd(node.id);wfPanel.innerHTML=buildWfHtml(node,nm,pd);bindWfEvents(node,nm,pd);}
  }));

  bindWfEvents(node,nodeMeta,prdData);
}

// Update workflow tab badge classes from fresh store data
function refreshWfTabs(nodeId){
  const nm=getNodeMeta(nodeId);const pd=getPrd(nodeId);
  const hasPrd=!!pd.content;const hasGen=!!(nm.helpContent&&nm.helpContent['zh-cn']);
  const anyTrans=ALL_LANGS.some(l=>!l.source&&hasUsableTranslation(nm.helpContent,l.code));
  const pub=(nm.publishedLangs||[]).length>0;
  const locked=!!transRunning[nodeId];
  // Stale detection for tab badges
  const anyStaleTranslation=anyTrans&&nm.contentVer&&ALL_LANGS.some(l=>!l.source&&hasUsableTranslation(nm.helpContent,l.code)&&((nm.transVers||{})[l.code]||'')<nm.contentVer&&(nm.transVers||{})[l.code]);
  const anyStalePublish=pub&&(nm.publishedLangs||[]).some(lang=>{const h=simpleHash((nm.helpContent||{})[lang]||'');const ph=(nm.pubVers||{})[lang]||'';return ph&&h&&ph!==h;});
  const doneMap={prd:hasPrd,gen_zh:hasGen,translate:anyTrans,edit_trans:anyTrans,publish:pub};
  document.querySelectorAll('.wf-tab[data-wf]').forEach(x=>{
    const t=x.dataset.wf;const active=t===currentWfTab;
    const tabStale=(t==='translate'&&anyStaleTranslation)||(t==='edit_trans'&&anyStaleTranslation)||(t==='publish'&&anyStalePublish);
    x.className=`wf-tab${active?' active':''}${doneMap[t]&&!active?' done':''}${tabStale&&!active?' stale-tab':''}${locked&&!active?' disabled-tab':''}`;
    x.style.opacity=locked&&!active?'0.45':'';
    x.title=locked&&!active?'翻译进行中，请等待完成或中断':tabStale&&!active?'有内容需要更新':'';
  });
}

// ===== PRD CHANGE GUARD =====
// Returns true if user confirms replacing existing PRD (and clears downstream data)
async function confirmAndClearDownstream(nodeId){
  const nm=getNodeMeta(nodeId);
  const hasGen=!!(nm.helpContent&&nm.helpContent['zh-cn']);
  const hasTrans=ALL_LANGS.some(l=>!l.source&&hasUsableTranslation(nm.helpContent,l.code));
  const hasPub=(nm.publishedLangs||[]).length>0;
  if(!hasGen&&!hasTrans&&!hasPub)return true; // nothing downstream, no confirmation needed
  const lines=['替换 PRD 将清空以下已完成的内容：',''];
  if(hasGen)lines.push('• 已生成的中文帮助文档');
  if(hasTrans)lines.push('• 所有多语言翻译内容');
  if(hasPub)lines.push('• 已发布部署的所有语言版本（文档中心将下线对应内容）');
  lines.push('','确认替换？此操作不可撤销。');
  if(!(await askConfirm(lines.join('\n'),'替换 PRD 确认')))return false;
  // Clear all downstream data
  patchNodeMeta(nodeId,{
    helpContent:{},
    publishedLangs:[],
    publishedAt:'',
    status:'prd_uploaded',
    contentVer:'',
    transVers:{},
    pubVers:{},
    manualEdits:{}
  });
  return true;
}

// ===== FILE READING HELPERS =====
function readFileAsText(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result||'');
    r.onerror=()=>reject(new Error('读取文件失败'));
    r.readAsText(file,'utf-8');
  });
}

async function extractDocxText(file){
  // Use JSZip to unzip .docx and extract word/document.xml text
  if(typeof JSZip==='undefined')throw new Error('JSZip 未加载，请检查网络连接后重试');
  const buf=await file.arrayBuffer();
  const zip=await JSZip.loadAsync(buf);
  const xmlFile=zip.file('word/document.xml');
  if(!xmlFile)throw new Error('无法解析 docx 文件结构');
  const xmlStr=await xmlFile.async('string');
  // Strip XML tags, decode common entities, normalize whitespace
  let text=xmlStr
    .replace(/<w:p[ >][^/]*\/>/g,'\n')       // self-closing paragraph → newline
    .replace(/<\/w:p>/g,'\n')                  // end of paragraph → newline
    .replace(/<w:br[^/]*/g,'\n')               // line break
    .replace(/<[^>]+>/g,'')                    // strip all remaining tags
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#x[0-9a-fA-F]+;/g,'')
    .replace(/[ \t]+/g,' ')                    // collapse spaces
    .replace(/\n{3,}/g,'\n\n')                 // collapse blank lines
    .trim();
  if(!text)throw new Error('docx 文件中未找到可读文本，请手动粘贴内容');
  return text;
}

async function extractPdfText(file){
  // Read PDF as ArrayBuffer and do basic ASCII/UTF-8 text extraction
  // This is a fallback approach; for full PDF support pdfjsLib can be loaded on demand
  const buf=await file.arrayBuffer();
  const bytes=new Uint8Array(buf);
  // Try to extract readable text streams from PDF (simplified heuristic)
  const decoder=new TextDecoder('latin1');
  const raw=decoder.decode(bytes);
  // Extract content between BT...ET (PDF text operators)
  const chunks=[];
  const btEt=/BT[\s\S]*?ET/g;
  let m;
  while((m=btEt.exec(raw))!==null){
    const block=m[0];
    // Extract strings in parentheses (Tj / TJ operators)
    const strPat=/\(([^)\\]*(?:\\.[^)\\]*)*)\)\s*(?:Tj|TJ|'|")/g;
    let sm;
    while((sm=strPat.exec(block))!==null){
      const s=sm[1].replace(/\\n/g,'\n').replace(/\\r/g,'').replace(/\\\(/g,'(').replace(/\\\)/g,')').replace(/\\\\/g,'\\');
      if(s.trim())chunks.push(s);
    }
  }
  if(!chunks.length){
    // If no BT/ET, suggest copy-paste
    throw new Error('PDF 文本提取失败（可能是扫描版 PDF 或加密文档），请手动复制 PDF 内容粘贴到文本框');
  }
  return chunks.join('\n').replace(/\n{3,}/g,'\n\n').trim();
}

function bindWfEvents(node,nodeMeta,prdData){
  if(currentWfTab==='prd'){
    const dz=document.getElementById('prdDz');
    const fi=document.getElementById('prdFile');
    const ta=document.getElementById('prdText');
    const cc=document.getElementById('prdChars');
    const MAX_PRD_SIZE=50*1024*1024; // 50 MB read limit
    const MAX_PRD_CHARS=500000;      // 50万字存储上限
    async function handlePrdFile(f){
      if(!f)return;
      if(f.size>MAX_PRD_SIZE){showToast(`文件过大（${(f.size/1024/1024).toFixed(1)} MB），最大支持 50 MB。`,'warn');return;}
      const dzText=dz?.querySelector('.dz-text');
      if(dzText)dzText.textContent='读取中…';
      if(dz)dz.style.borderColor='var(--brand)';
      try{
        let text='';
        const ext=f.name.split('.').pop().toLowerCase();
        if(ext==='docx'){
          text=await extractDocxText(f);
        }else if(ext==='pdf'){
          text=await extractPdfText(f);
        }else{
          text=await readFileAsText(f);
        }
        // Truncate gracefully if still too large after extraction
        if(text.length>MAX_PRD_CHARS){
          text=text.slice(0,MAX_PRD_CHARS)+`\n\n[… 内容已截断，超出 ${MAX_PRD_CHARS/10000} 万字上限 …]`;
        }
        if(ta)ta.value=text;
        if(cc)cc.textContent=text.length+' 字符';
        if(dzText)dzText.textContent='✅ 已选择：'+f.name;
        if(dz)dz.dataset.fn=f.name;
      }catch(err){
        if(dzText)dzText.textContent='❌ 读取失败：'+err.message;
        showToast('文件读取失败：'+err.message,'warn');
      }finally{
        if(dz)dz.style.borderColor='';
      }
    }
    // Guard: ask before overwriting existing PRD (only if downstream content exists)
    async function guardedHandlePrdFile(f){
      if(!f)return;
      const existingPrd=getPrd(node.id);
      if(existingPrd.content){
        if(!(await confirmAndClearDownstream(node.id))){
          if(fi)fi.value=''; // reset file input
          return;
        }
      }
      await handlePrdFile(f);
    }
    if(dz){
      dz.addEventListener('click',()=>fi?.click());
      dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--brand)';});
      dz.addEventListener('dragleave',()=>dz.style.borderColor='');
      dz.addEventListener('drop',e=>{e.preventDefault();guardedHandlePrdFile(e.dataTransfer?.files[0]);});
      if(fi)fi.addEventListener('change',()=>guardedHandlePrdFile(fi.files[0]));
    }
    if(ta&&cc)ta.addEventListener('input',()=>{cc.textContent=ta.value.length+' 字符';});
    document.getElementById('savePrdBtn')?.addEventListener('click',async()=>{
      const content=(ta?.value||'').trim();
      if(!requireField(!!content,ta||document.getElementById('savePrdBtn'),'请输入或上传 PRD 内容'))return;
      if(content.length>500000){markFieldInvalid(ta||document.getElementById('savePrdBtn'));showToast(`内容过长（${content.length} 字符），超过 50 万字上限，请精简后再保存。`,'warn');return;}
      // Check if overwriting existing PRD — confirm and clear downstream if needed
      const existingPrd=getPrd(node.id);
      if(existingPrd.content&&existingPrd.content.trim()!==content){
        if(!(await confirmAndClearDownstream(node.id))){
          // User cancelled — restore textarea to original PRD content
          if(ta)ta.value=existingPrd.content;
          if(cc)cc.textContent=(existingPrd.content||'').length+' 字符';
          return;
        }
      }
      const filename=dz?.dataset.fn||(node.title+'-prd.md');
      const btn=document.getElementById('savePrdBtn');
      if(btn){btn.disabled=true;btn.textContent='保存中...';}
      await new Promise(r=>setTimeout(r,16));
      try{
        savePrd(node.id,content,filename);
        patchNodeMeta(node.id,{status:'prd_uploaded'});
        currentWfTab='gen_zh';
        updateRightPanel();
      }catch(e){
        if(btn){btn.disabled=false;btn.textContent='保存 PRD';}
        showToast('保存失败（存储空间可能不足）：'+e.message,'warn');
      }
    });
  }

  // ② 生成中文说明文档 (gen_zh = generate + edit zh-cn)
  if(currentWfTab==='gen_zh'){
    editLang='zh-cn';
    document.getElementById('startGenBtn')?.addEventListener('click',async()=>{
      if(pipelineRunning)return;
      const cur=getNodeMeta(node.id);
      const hasExisting=!!(cur.helpContent&&cur.helpContent['zh-cn']);
      if(hasExisting&&!(await askConfirm('重新生成将覆盖现有中文文档，无法恢复。\n确认重新生成吗？','重新生成确认')))return;
      genAbortFlag=false;
      runPipeline(node.id,node.title,node.pathText||node.title);
    });
    document.getElementById('abortGenBtn')?.addEventListener('click',()=>{
      genAbortFlag=true;
    });
    document.getElementById('saveContentBtn')?.addEventListener('click',async()=>{
      const ta=document.getElementById('editArea');
      const content=ta?.value||'';
      const cur=getNodeMeta(node.id);
      const existing=(cur.helpContent||{})['zh-cn']||'';
      if(existing&&existing.trim()&&!(await askConfirm('保存后将覆盖现有中文内容，无法恢复。\n确认保存修改吗？','保存中文确认'))){if(ta)ta.value=existing;return;}
      patchNodeMeta(node.id,{helpContent:{...(cur.helpContent||{}),'zh-cn':content},contentVer:nowISO()});
      refreshWfPanel(node.id);
    });
  }

  // ④ 编辑多语言 — only translated langs are clickable
  if(currentWfTab==='edit_trans'){
    document.querySelectorAll('.lang-edit-tab[data-el]:not([disabled])').forEach(b=>b.addEventListener('click',()=>{
      if(!b.dataset.el)return;
      editLang=b.dataset.el;
      refreshWfPanel(node.id);
    }));
    document.getElementById('saveContentBtn')?.addEventListener('click',async()=>{
      const ta=document.getElementById('editArea');
      const content=ta?.value||'';
      const cur=getNodeMeta(node.id);
      const existing=(cur.helpContent||{})[editLang]||'';
      if(existing&&existing.trim()&&!(await askConfirm(`保存后将覆盖「${editLang}」的现有译文，无法恢复。\n确认保存修改吗？`,'保存译文确认'))){if(ta)ta.value=existing;return;}
      patchNodeMeta(node.id,{helpContent:{...(cur.helpContent||{}),[editLang]:content},manualEdits:{...(cur.manualEdits||{}),[editLang]:true}});
      refreshWfPanel(node.id);
    });
  }

  if(currentWfTab==='translate'){
    document.querySelectorAll('[data-tl]').forEach(b=>b.addEventListener('click',()=>startTranslate(node.id,b.dataset.tl)));
    document.getElementById('tlAllBtn')?.addEventListener('click',()=>startTranslateAll(node.id));
    document.getElementById('abortTransBtn')?.addEventListener('click',()=>{
      transAbortFlag[node.id]=true;
      delete transRunning[node.id];
      transErrors[node.id]='翻译已被中断';
      refreshWfPanel(node.id);
    });
  }

  if(currentWfTab==='publish'){
    document.getElementById('pubBtn')?.addEventListener('click',()=>doPublish(node.id));
    // Per-language quick-publish buttons
    document.querySelectorAll('.pub-quick-btn[data-qp]').forEach(btn=>btn.addEventListener('click',()=>{
      const lang=btn.dataset.qp;
      const nm=getNodeMeta(node.id);
      const langs=[...new Set([...(nm.publishedLangs||[]),lang])];
      const h=simpleHash((nm.helpContent||{})[lang]||'');
      const me=Object.assign({},(nm.manualEdits||{}));delete me[lang]; // clear manual edit flag after publish
      patchNodeMeta(node.id,{publishedLangs:langs,publishedAt:nowISO(),pubVers:Object.assign({},(nm.pubVers||{}),{[lang]:h}),manualEdits:me});
      btn.textContent='\u2713 \u5df2\u66f4\u65b0';btn.disabled=true;
      refreshWfTabs(node.id);
    }));
    document.getElementById('unpubBtn')?.addEventListener('click',async()=>{
      if(!(await askConfirm('确认取消发布所有语言？','取消发布确认')))return;
      patchNodeMeta(node.id,{publishedLangs:[],publishedAt:''});
      updateRightPanel();
    });
    const pubToggleBtn=document.getElementById('pubToggleSelBtn');
    function syncPubToggleBtn(){
      if(!pubToggleBtn)return;
      const cbs=[...document.querySelectorAll('.pub-cb:not(:disabled)')];
      pubToggleBtn.textContent=cbs.length&&cbs.every(cb=>cb.checked)?'全不选':'全选';
    }
    if(pubToggleBtn){
      pubToggleBtn.addEventListener('click',()=>{
        const cbs=[...document.querySelectorAll('.pub-cb:not(:disabled)')];
        const allChecked=cbs.every(cb=>cb.checked);
        cbs.forEach(cb=>{cb.checked=!allChecked;});
        syncPubToggleBtn();
      });
      // Re-sync button label whenever any checkbox changes
      document.querySelectorAll('.pub-cb').forEach(cb=>cb.addEventListener('change',syncPubToggleBtn));
      syncPubToggleBtn(); // initial state
    }
  }
}

// ===== PIPELINE =====
function updatePipelineDisplay(){
  // Only update the streaming output box (phase display is simplified)
  const sel=document.getElementById('pipelineStreamEl');
  if(sel){sel.textContent=pipelineStreamText;sel.scrollTop=sel.scrollHeight;}
}

async function runPipeline(nodeId, title, path) {
  pipelineRunning=true;
  pipelinePhaseIdx=0;
  pipelineStreamText='';
  // Refresh panel immediately so the "generating" UI box appears
  refreshWfPanel(nodeId);

  // Phase 1-3: simulate with short delays (skip if already aborted)
  for(let i=0;i<3;i++){
    if(genAbortFlag)break;
    pipelinePhaseIdx=i;
    await new Promise(r=>setTimeout(r,PIPELINE_PHASES[i].ms||500));
  }

  if(genAbortFlag){
    pipelineRunning=false;genAbortFlag=false;pipelineStreamText='';
    refreshWfPanel(nodeId);return;
  }

  // Phase 4: real LLM call or template fallback
  pipelinePhaseIdx=3;
  const prdData=getPrd(nodeId);
  let content='';
  if(hasApiKey()){
    pipelineStreamText='🤖 正在调用 Skill AI...\n';
    updatePipelineDisplay();
    try{
      content=await callSkillLLM(prdData.content||'',title,(delta,full)=>{
        if(genAbortFlag)throw new Error('user_aborted');
        pipelineStreamText=full;
        const sel=document.getElementById('pipelineStreamEl');
        if(sel){sel.textContent=full;sel.scrollTop=sel.scrollHeight;}
      });
      if(genAbortFlag){pipelineRunning=false;genAbortFlag=false;pipelineStreamText='';refreshWfPanel(nodeId);return;}
      pipelineStreamText=content;
    }catch(err){
      if(genAbortFlag||err.message==='user_aborted'){
        pipelineRunning=false;genAbortFlag=false;pipelineStreamText='';refreshWfPanel(nodeId);return;
      }
      pipelineStreamText=`⚠️ LLM 调用失败（${err.message}），已降级为内置模板生成。`;
      updatePipelineDisplay();
      content=generateFromPRD(prdData.content||'',title,path);
    }
  }else{
    pipelineStreamText='ℹ️ 未配置 API Key，使用内置解析器生成（非 AI）。';
    updatePipelineDisplay();
    await new Promise(r=>setTimeout(r,400));
    if(genAbortFlag){pipelineRunning=false;genAbortFlag=false;pipelineStreamText='';refreshWfPanel(nodeId);return;}
    content=generateFromPRD(prdData.content||'',title,path);
  }

  pipelineRunning=false;
  genAbortFlag=false;
  pipelinePhaseIdx=PIPELINE_PHASES.length;
  const cur=getNodeMeta(nodeId);
  patchNodeMeta(nodeId,{helpContent:{...(cur.helpContent||{}),'zh-cn':content},status:'generated',contentVer:nowISO()});
  currentWfTab='gen_zh';
  pipelineStreamText='';
  updateRightPanel();
}

// ===== PRD PARSER (strictly aligned with for-teammates/PROMPT.md input contract) =====
function parsePRD(prdText) {
  const text = String(prdText || '').replace(/\r\n/g, '\n');
  const lines = text.split('\n');
  const out = {
    title: '',
    sections: {},
    headings: [],
    features: [],
    faq: [],
    pricingBlocks: [],
    prereqs: [],
    journeys: [],
    links: [],
    contract: { slug:'', zhName:'', enName:'', oneLinerZh:'', oneLinerEn:'', coreFeatures:[], downloadLinks:[] }
  };

  // 1) heading blocks
  let current = '__root__';
  let buf = [];
  function flush() {
    const b = buf.join('\n').trim();
    if (b) out.sections[current] = (out.sections[current] ? out.sections[current] + '\n\n' : '') + b;
    buf = [];
  }
  lines.forEach(line => {
    const m = line.match(/^(#{1,6})\s+(.+)$/);
    if (m) {
      flush();
      current = m[2].trim();
      out.headings.push({ level: m[1].length, title: current });
      if (!out.title && m[1].length === 1) out.title = current;
      return;
    }
    buf.push(line);
  });
  flush();

  // 2) extract core contract (PROMPT.md required 5 fields)
  const full = text;
  const slugM = full.match(/(?:URL\s*slug|slug)\s*[：:]\s*([a-z0-9-]{2,40})/i);
  if (slugM) out.contract.slug = slugM[1].trim();

  const nameTableM = full.match(/产品名\s*\|?\s*([^\n|：:]+?)\s*\/\s*([^\n|：:]+)/);
  if (nameTableM) {
    out.contract.zhName = nameTableM[1].trim();
    out.contract.enName = nameTableM[2].trim();
  }

  const oneLinerM = full.match(/(?:一句话|定位)\s*[：:]\s*([^\n]+)/);
  if (oneLinerM) out.contract.oneLinerZh = oneLinerM[1].trim();
  const oneLinerEnM = full.match(/(?:one[- ]line|positioning)\s*[：:]\s*([^\n]+)/i);
  if (oneLinerEnM) out.contract.oneLinerEn = oneLinerEnM[1].trim();

  // 3) classify sections
  Object.entries(out.sections).forEach(([heading, body]) => {
    const h = heading.toLowerCase();
    if (/核心功能|功能|特性|能力|feature/i.test(h)) {
      const titleParts = body.match(/^#{3,6}\s+.+$/mg) || [];
      titleParts.forEach(t => {
        const n = t.replace(/^#{3,6}\s+/, '').trim();
        if (n && !out.features.some(f => f.name === n)) out.features.push({ name: n, desc: '' });
      });
      const bullets = body.match(/^[-*+]\s+.+/mg) || [];
      const nums = body.match(/^\d+[.)]\s+.+/mg) || [];
      [...bullets, ...nums].forEach(line => {
        const clean = line.replace(/^[-*+\d.)\s]+/, '').trim();
        if (clean.length < 3) return;
        const name = clean.split(/[：:]/)[0].slice(0, 32).trim();
        if (!out.features.some(f => f.name === name)) out.features.push({ name, desc: clean });
      });
    }
    if (/常见问题|faq|问答/i.test(h)) {
      const qs = body.match(/(?:^|\n)\s*(?:Q|问)[：:.]\s*([^\n]+)/gi) || [];
      const as = body.match(/(?:^|\n)\s*(?:A|答)[：:.]\s*([\s\S]*?)(?=(?:\n\s*(?:Q|问)[：:.])|$)/gi) || [];
      for (let i = 0; i < Math.min(qs.length, as.length); i++) {
        out.faq.push({
          q: qs[i].replace(/(?:^|\n)\s*(?:Q|问)[：:.]\s*/i, '').trim(),
          a: as[i].replace(/(?:^|\n)\s*(?:A|答)[：:.]\s*/i, '').trim()
        });
      }
    }
    if (/定价|价格|收费|会员|vip|pricing/i.test(h)) out.pricingBlocks.push(`### ${heading}\n\n${body.trim()}`);
    if (/前提|系统要求|适用平台|兼容性|platform|requirement/i.test(h)) {
      const items = body.match(/^[-*+]\s+.+/mg) || [];
      out.prereqs.push(...items.map(i => i.replace(/^[-*+]\s+/, '').trim()));
    }
    if (/旅程|流程|步骤|quick-start|快速入门|使用场景/i.test(h)) out.journeys.push(`### ${heading}\n\n${body.trim()}`);
  });

  // 4) extract markdown table links (esp. 获取方式)
  const tableRows = text.match(/^\|[^\n]+\|$/mg) || [];
  tableRows.forEach(row => {
    if (/^(\|\s*[-: ]+\s*)+\|$/.test(row)) return;
    const cols = row.split('|').map(v => v.trim()).filter(Boolean);
    if (cols.length < 2) return;
    const possibleUrl = cols.find(c => /https?:\/\//i.test(c));
    const appStore = cols.find(c => /App Store|Google Play|搜索/i.test(c));
    if (possibleUrl || appStore) {
      out.links.push({ platform: cols[0], value: possibleUrl || appStore || cols[1] });
    }
  });
  out.contract.downloadLinks = out.links.slice(0, 12);
  out.contract.coreFeatures = out.features.map(f => toSlug(f.name)).filter(Boolean).slice(0, 8);
  return out;
}

function buildContractSummary(parsed, nodeTitle) {
  const c = parsed.contract;
  const extracted = [];
  const pending = [];
  if (c.slug) extracted.push(`- slug：${c.slug}`); else pending.push('- URL slug（未识别，建议按英文名生成）');
  if (c.zhName) extracted.push(`- 中文产品名：${c.zhName}`); else pending.push('- 中文产品名');
  if (c.enName) extracted.push(`- 英文产品名：${c.enName}`); else pending.push('- 英文产品名');
  if (c.oneLinerZh) extracted.push(`- 一句话定位（中文）：${c.oneLinerZh}`);
  else pending.push('- 一句话定位（中文）');
  if (c.coreFeatures.length >= 3) extracted.push(`- 核心功能列表：${c.coreFeatures.join(' / ')}`);
  else pending.push('- 核心功能列表（建议 3-8 个）');
  if (c.downloadLinks.length) extracted.push(`- 各端获取链接：已识别 ${c.downloadLinks.length} 条`);
  else pending.push('- 各端获取链接（Windows/macOS/iOS/Android/Web/硬件）');

  let out = `## 输入契约抽取结果（基于 PRD 自动提取）\n\n`;
  out += `### 已从 PRD 抽取\n${extracted.length ? extracted.join('\n') : '- （暂无，可在 PRD 中补充）'}\n\n`;
  out += `### PRD 中待确认项\n${pending.length ? pending.join('\n') : '- 无（输入契约已满足）'}\n\n`;
  out += `> 说明：以上抽取规则对齐 \`for-teammates/PROMPT.md\` 的输入契约（5 项必填）。\n\n`;
  return out;
}

// ===== HELP CONTENT GENERATOR (Phase 4, Chinese only per user request) =====
function generateFromPRD(prdContent, nodeTitle, nodePath) {
  const parsed = parsePRD(prdContent);
  const docTitle = parsed.contract.zhName || parsed.title || nodeTitle;
  const now = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
  const sections = parsed.sections;
  const pick = (re) => Object.entries(sections).filter(([k]) => re.test(k)).map(([k,v]) => `### ${k}\n\n${v}`).join('\n\n');

  let doc = `# ${docTitle}\n\n`;
  doc += `> **更新日期：** ${now} | **适用平台：** 桌面版、Web 版、移动版\n`;
  doc += `>\n> *已加载 6 阶段流水线 + 合规 + i18n + 首页规范。本文档按 \`generate-help-content\` skill 规则，从 PRD 原文抽取并重组生成（中文）。*\n\n`;
  doc += `---\n\n`;
  doc += buildContractSummary(parsed, nodeTitle);

  // 1) 开始使用
  doc += `## 开始使用\n\n`;
  const overview = pick(/背景|目标|定位|概述|简介|产品定位|核心场景/i);
  doc += `### 产品概述\n\n${overview || (sections.__root__ || '请补充产品背景与定位。')}\n\n`;

  doc += `### 获取客户端\n\n`;
  if (parsed.contract.downloadLinks.length) {
    parsed.contract.downloadLinks.forEach(link => {
      doc += `> **📥 ${link.platform} 获取方式**\n`;
      if (/https?:\/\//i.test(link.value)) {
        const url = (link.value.match(/https?:\/\/[^\s)]+/i) || [link.value])[0];
        doc += `> 访问 [${url}](${url}) 获取对应客户端。\n\n`;
      } else {
        doc += `> ${link.value}\n\n`;
      }
    });
  } else {
    doc += `> **📥 获取方式**\n> 前往 [wps.com](https://www.wps.com) 下载客户端；移动端可在 App Store / Google Play 搜索「WPS Office」。\n\n`;
  }

  doc += `### 快速入门\n\n`;
  const journeys = parsed.journeys.join('\n\n');
  doc += journeys || `1. 打开应用并进入「${docTitle}」\n2. 按提示完成录音/转写配置\n3. 生成并查看结构化纪要\n\n`;

  // 2) 核心功能
  doc += `## 核心功能\n\n`;
  if (parsed.features.length) {
    doc += `| 功能名称 | 简述 |\n|---|---|\n`;
    parsed.features.slice(0, 12).forEach(f => {
      doc += `| ${f.name} | ${(f.desc || f.name).replace(/\n/g, ' ').slice(0, 120)} |\n`;
    });
    doc += '\n';
  }
  const coreRaw = pick(/核心功能|功能|特性|能力/i);
  doc += `${coreRaw || '（未在 PRD 中识别到完整的核心功能章节，请补充）'}\n\n`;

  // 3) 会员与定价
  doc += `## 会员与定价\n\n`;
  if (parsed.pricingBlocks.length) doc += `${parsed.pricingBlocks.join('\n\n')}\n\n`;
  else {
    const priceHints = prdContent.match(/(?:RMB|USD|￥|¥|\$)\s*\d+[^\n]*/gi) || [];
    if (priceHints.length) doc += priceHints.map(v => `- ${v}`).join('\n') + '\n\n';
    else doc += `> 暂未在 PRD 中识别到明确定价，建议在发布前补充。\n\n`;
  }

  // 4) 常见问题
  doc += `## 常见问题\n\n`;
  if (parsed.faq.length) {
    parsed.faq.forEach(item => { doc += `**Q：${item.q}**\n\nA：${item.a}\n\n`; });
  } else {
    const risks = pick(/风险|待定|问题/i);
    if (risks) doc += `${risks}\n\n`;
    doc += `**Q：如何确认该文档与 PRD 一致？**\n\nA：文档顶部包含输入契约抽取结果，并优先复用 PRD 原文段落；可在“编辑内容”中进一步校正。\n\n`;
  }

  doc += `---\n\n*如需进一步帮助，请访问 [WPS 官方帮助中心](https://support.wps.cn)*`;
  return doc;
}

// ===== TRANSLATION (robust markdown-aware, with quality gate) =====
const LANG_CODE_MAP = { 'en-us':'en', 'zh-tw':'zh-TW', 'ja-jp':'ja', 'ko-kr':'ko', 'es-mx':'es' };
const transErrors = {};   // {[nodeId]: string} — last global error message
const transLangErrors = {}; // {[nodeId]: {[langCode]: string}} — per-language error for retry

function normalizeTextForCompare(s) {
  return String(s || '').replace(/[`*#>\-|_\[\](){}]/g, '').replace(/\s+/g, '').toLowerCase();
}
function cjkRatio(s) {
  const txt = String(s || '');
  if (!txt.length) return 0;
  const m = txt.match(/[\u4e00-\u9fff]/g) || [];
  return m.length / txt.length;
}
function translationLooksValid(src, dst, lang) {
  if (!dst || dst.trim().length < 40) return false;
  const ns = normalizeTextForCompare(src);
  const nd = normalizeTextForCompare(dst);
  if (ns && nd && ns === nd) return false;
  // non-Chinese targets should not remain mostly Chinese
  if (lang !== 'zh-tw' && cjkRatio(dst) > 0.35) return false;
  // should differ enough from source
  const samePrefix = ns.slice(0, 160) && ns.slice(0, 160) === nd.slice(0, 160);
  if (samePrefix) return false;
  return true;
}
function hasUsableTranslation(helpContent, lang) {
  const content = (helpContent || {})[lang] || '';
  const zh = (helpContent || {})['zh-cn'] || '';
  if (!content.trim()) return false;
  if (lang === 'zh-cn') return true;
  return translationLooksValid(zh, content, lang);
}

async function translatePlain(text, targetLangCode) {
  const tl = LANG_CODE_MAP[targetLangCode] || 'en';
  const source = String(text || '').trim();
  if (!source) return '';
  const endpoints = [
    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=${encodeURIComponent(tl)}&dt=t&q=${encodeURIComponent(source)}`,
    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${encodeURIComponent(tl)}&dt=t&q=${encodeURIComponent(source)}`
  ];
  for (const url of endpoints) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(String(resp.status));
      const data = await resp.json();
      const out = (data[0] || []).map(seg => seg[0] || '').join('');
      if (out && out.trim()) return out;
    } catch (_) {}
  }
  // fallback for short fragments only
  try {
    const short = source.slice(0, 220);
    const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(short)}&langpair=zh-CN|${encodeURIComponent(tl)}`);
    const data = await resp.json();
    const out = data.responseData?.translatedText || '';
    if (out.trim()) return out;
  } catch (_) {}
  throw new Error('translate_request_failed');
}

async function translateMarkdownLine(line, targetLangCode, inCodeBlock) {
  if (inCodeBlock || !line.trim()) return line;
  if (/^\s*```/.test(line)) return line;
  if (/^\s*[-:| ]+\s*$/.test(line)) return line; // table separators

  // preserve markdown prefix syntax
  const prefixM = line.match(/^(\s*(?:#{1,6}\s+|[-*+]\s+|\d+[.)]\s+|>\s+|\|\s*))/);
  const prefix = prefixM ? prefixM[1] : '';
  const core = line.slice(prefix.length);
  if (!/[\u4e00-\u9fff]/.test(core)) return line; // only translate Chinese lines

  // Table rows: translate cell-by-cell
  if (/^\s*\|.+\|\s*$/.test(line)) {
    const cells = line.split('|');
    const out = [];
    for (let i = 0; i < cells.length; i++) {
      const cell = cells[i];
      if (!/[\u4e00-\u9fff]/.test(cell)) { out.push(cell); continue; }
      try { out.push(await translatePlain(cell, targetLangCode)); }
      catch (_) { out.push(cell); }
    }
    return out.join('|');
  }

  try {
    const translated = await translatePlain(core, targetLangCode);
    return prefix + translated;
  } catch (_) {
    return line;
  }
}

async function translateFull(zhContent, targetLangCode) {
  const lines = String(zhContent || '').replace(/\r\n/g, '\n').split('\n');
  const out = [];
  let inCodeBlock = false;
  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i];
    if (/^\s*```/.test(ln)) inCodeBlock = !inCodeBlock;
    const translatedLine = await translateMarkdownLine(ln, targetLangCode, inCodeBlock);
    out.push(translatedLine);
    if (i % 10 === 0) await new Promise(r => setTimeout(r, 80)); // throttle
  }
  return out.join('\n');
}

async function doTranslateOne(zh, lang) {
  const translated = await translateFull(zh, lang);
  if (!translationLooksValid(zh, translated, lang)) throw new Error('translation_quality_failed');
  return translated;
}

function startTranslate(nodeId, lang, retryCount=0) {
  transErrors[nodeId] = '';
  if(!transLangErrors[nodeId])transLangErrors[nodeId]={};
  delete transLangErrors[nodeId][lang];
  transAbortFlag[nodeId] = false;
  transRunning[nodeId] = lang;
  refreshWfPanel(nodeId);
  const cur = getNodeMeta(nodeId);
  const zh = (cur.helpContent || {})['zh-cn'] || '';
  if (!zh.trim()) {
    delete transRunning[nodeId];
    transErrors[nodeId] = '请先生成中文版本';
    refreshWfPanel(nodeId);
    return;
  }
  doTranslateOne(zh, lang).then(translated => {
    if (transAbortFlag[nodeId]) return;
    const c = getNodeMeta(nodeId);
    // Record which contentVer this translation was based on
    const newTransVers={...(c.transVers||{}),[lang]:c.contentVer||''};
    // Clear manual-edit flag since we just replaced with fresh translation
    const newManualEdits={...(c.manualEdits||{})};delete newManualEdits[lang];
    patchNodeMeta(nodeId, { helpContent: { ...(c.helpContent || {}), [lang]: translated }, transVers:newTransVers, manualEdits:newManualEdits });
    delete transRunning[nodeId];
    if(transLangErrors[nodeId])delete transLangErrors[nodeId][lang];
    refreshWfPanel(nodeId);
  }).catch(err => {
    if (transAbortFlag[nodeId]) return;
    delete transRunning[nodeId];
    // Auto-retry once on network / rate-limit errors
    if(retryCount<1 && err?.message!=='translation_quality_failed'){
      setTimeout(()=>startTranslate(nodeId,lang,retryCount+1),2000);
      if(!transLangErrors[nodeId])transLangErrors[nodeId]={};
      transLangErrors[nodeId][lang]='限流，2秒后自动重试...';
      refreshWfPanel(nodeId);
      return;
    }
    if(!transLangErrors[nodeId])transLangErrors[nodeId]={};
    transLangErrors[nodeId][lang] = err?.message === 'translation_quality_failed'
      ? '翻译质量校验未通过'
      : `失败：${err?.message || '请重试'}`;
    refreshWfPanel(nodeId);
  });
}

function startTranslateAll(nodeId) {
  transErrors[nodeId] = '';
  transLangErrors[nodeId] = {};
  transAbortFlag[nodeId] = false;
  const cur = getNodeMeta(nodeId);
  const zh = (cur.helpContent || {})['zh-cn'] || '';
  if (!zh.trim()) { showToast('请先生成中文版本','warn'); return; }
  const todo = ALL_LANGS.filter(l => !l.source && !hasUsableTranslation(cur.helpContent || {}, l.code));
  if (!todo.length) { showToast('所有语言均已翻译','ok'); return; }
  async function runAll() {
    for (const l of todo) {
      if (transAbortFlag[nodeId]) break;
      transRunning[nodeId] = l.code;
      delete (transLangErrors[nodeId]||{})[l.code];
      refreshWfPanel(nodeId);
      let success=false;
      for(let retry=0;retry<=1;retry++){
        if(transAbortFlag[nodeId])break;
        try {
          const translated = await doTranslateOne(zh, l.code);
          if (transAbortFlag[nodeId]) break;
          const c = getNodeMeta(nodeId);
          const newTV={...(c.transVers||{}),[l.code]:c.contentVer||''};
          const newME={...(c.manualEdits||{})};delete newME[l.code];
          patchNodeMeta(nodeId, { helpContent: { ...(c.helpContent || {}), [l.code]: translated }, transVers:newTV, manualEdits:newME });
          success=true;break;
        } catch (err) {
          if (transAbortFlag[nodeId] || err?.message==='translation_quality_failed') {
            if(!transLangErrors[nodeId])transLangErrors[nodeId]={};
            transLangErrors[nodeId][l.code]=err?.message==='translation_quality_failed'?'质量校验未通过':err?.message||'失败';
            break;
          }
          if(retry===0){await new Promise(r=>setTimeout(r,2000));}
          else{if(!transLangErrors[nodeId])transLangErrors[nodeId]={};transLangErrors[nodeId][l.code]=err?.message||'失败';}
        }
      }
    }
    delete transRunning[nodeId];
    transAbortFlag[nodeId] = false;
    refreshWfPanel(nodeId);
  }
  runAll();
}

function doPublish(nodeId){
  const selected=[...document.querySelectorAll('.pub-cb:checked')].map(c=>c.value);
  if(!requireField(selected.length>0,document.getElementById('pubBtn'),'请至少选择一种语言'))return;
  const meta=getNodeMeta(nodeId);
  const invalid=selected.filter(lang=>!hasUsableTranslation(meta.helpContent||{},lang));
  if(invalid.length){
    showToast(`以下语言未通过翻译校验，无法发布：${invalid.join(', ')}`,'warn');
    return;
  }
  const log=document.getElementById('deployLog');
  if(log){log.style.display='block';log.innerHTML='';}
  const steps=[
    {t:'▶ 连接部署服务...',c:'log-info',ms:300},
    {t:`  ✓ 选择语言: ${selected.join(', ')}`,c:'log-ok',ms:500},
    {t:'  ✓ 内容完整性检查通过',c:'log-ok',ms:600},
    {t:'  ⚙ 生成静态 HTML 文件...',c:'log-info',ms:700},
    {t:'  ✓ 构建成功 (1.2s)',c:'log-ok',ms:400},
    {t:'  ⚙ 推送至 CDN 边缘节点...',c:'log-info',ms:600},
    {t:'  ✓ 缓存刷新完成',c:'log-ok',ms:400},
    {t:`✅ 发布成功！${selected.length} 个语言版本已上线`,c:'log-ok',ms:0}
  ];
  let d=0;
  steps.forEach(s=>{
    d+=s.ms;
    setTimeout(()=>{
      if(log){log.innerHTML+=`<div class="${s.c}">${esc(s.t)}</div>`;log.scrollTop=log.scrollHeight;}
      if(s.ms===0){
        // Record pubVers = hash of content at publish time per language
        const meta=getNodeMeta(nodeId);
        const newPubVers={...(meta.pubVers||{})};
        const newManualEdits={...(meta.manualEdits||{})};
        selected.forEach(lang=>{newPubVers[lang]=simpleHash((meta.helpContent||{})[lang]||'');delete newManualEdits[lang];});
        patchNodeMeta(nodeId,{publishedLangs:selected,publishedAt:nowISO(),status:'published',pubVers:newPubVers,manualEdits:newManualEdits});
        setTimeout(()=>updateRightPanel(),500);
      }
    },d);
  });
}

// ===== TREE STRUCTURE OPS =====
function findNode(tree,id){
  for(const l1 of tree){if(l1.id===id)return l1;for(const l2 of(l1.children||[])){if(l2.id===id)return l2;for(const l3 of(l2.children||[]))if(l3.id===id)return l3;}}return null;
}
function isTreeLeaf(tree,nodeId){const n=findNode(tree,nodeId);return!!n&&!((n.children||[]).length);}
function removeNodeFromTree(tree,id){
  const i1=tree.findIndex(n=>n.id===id);if(i1>=0)return tree.splice(i1,1);
  for(const l1 of tree){const i2=(l1.children||[]).findIndex(n=>n.id===id);if(i2>=0)return l1.children.splice(i2,1);for(const l2 of(l1.children||[])){const i3=(l2.children||[]).findIndex(n=>n.id===id);if(i3>=0)return l2.children.splice(i3,1);}}
}
function collectSubIds(rootId,tree){const r=findNode(tree||state.tree,rootId);if(!r)return[];const ids=[];(function w(n){ids.push(n.id);(n.children||[]).forEach(w);})(r);return ids;}
function collectSubIdsFor(tree,rootId){return collectSubIds(rootId,tree);}

async function addNode(mode){
  const node=state.nodeMap[selectedNodeId];if(!node)return;
  if(!isAdmin()){
    if(mode==='child'&&!canAction(state.currentUser.id,'edit_structure',node.id)){showToast('无权限在该节点新增子级','warn');return;}
    if(mode==='sibling'){
      const pid=node.parentId||'';
      if(!pid||!canAction(state.currentUser.id,'edit_structure',pid)){showToast('无权限在该位置新增同级节点','warn');return;}
    }
  }
  if(mode==='child'&&node.level>=3){showToast('三级节点不可新增子级。','warn');return;}
  const title=await askPrompt(mode==='child'?'请输入子节点名称':'请输入同级节点名称','','新增节点');
  if(!title||!title.trim())return;
  const tree=deepClone(state.tree);
  const newNode={id:genId('node'),title:title.trim(),children:[]};
  if(mode==='child'){const t=findNode(tree,node.id);t.children=t.children||[];t.children.push(newNode);}
  else{
    if(!node.parentId){const i=tree.findIndex(n=>n.id===node.id);tree.splice(i+1,0,newNode);}
    else{const p=findNode(tree,node.parentId);const i=(p.children||[]).findIndex(n=>n.id===node.id);p.children.splice(i+1,0,newNode);}
  }
  writeStore(STORE.tree,tree);refreshState();selectedNodeId=newNode.id;renderTreePanel();
}
async function renameNode(){
  const node=state.nodeMap[selectedNodeId];if(!node)return;
  if(!isAdmin()&&!canAction(state.currentUser.id,'edit_structure',node.id)){showToast('无权限重命名该节点','warn');return;}
  const title=await askPrompt('请输入新名称',node.title,'重命名节点');if(!title||!title.trim())return;
  const tree=deepClone(state.tree);findNode(tree,node.id).title=title.trim();
  writeStore(STORE.tree,tree);refreshState();renderTreePanel();
}
async function deleteNode(){
  const node=state.nodeMap[selectedNodeId];if(!node)return;
  if(!isAdmin()&&!canAction(state.currentUser.id,'edit_structure',node.id)){showToast('无权限删除该节点','warn');return;}
  if(!(await askConfirm(`确认删除节点「${node.title}」及其子节点吗？`,'删除节点确认')))return;
  const ids=collectSubIds(node.id);
  const tree=deepClone(state.tree);removeNodeFromTree(tree,node.id);
  if(!tree.length){showToast('至少保留一个一级节点。','warn');return;}
  writeStore(STORE.tree,tree);
  const nm=readStore(STORE.nodeMeta,{});ids.forEach(id=>delete nm[id]);writeStore(STORE.nodeMeta,nm);
  const pd=readStore(STORE.prd,{});ids.forEach(id=>delete pd[id]);writeStore(STORE.prd,pd);
  writeStore(STORE.groups,readStore(STORE.groups,[]).map(g=>({...g,nodeScopes:(g.nodeScopes||[]).filter(id=>!ids.includes(id))})));
  writeStore(STORE.directGrants,readStore(STORE.directGrants,[]).map(g=>({...g,nodeScopes:(g.nodeScopes||[]).filter(id=>!ids.includes(id))})));
  refreshState();selectedNodeId=state.nodes[0]?state.nodes[0].id:'';renderTreePanel();
}

  if(!(await askConfirm('确认重置目录？将清除所有 PRD 和帮助文档数据。','重置目录确认')))return;
  const nextTree=convertTreeFromData(window.WPS_DOC_TREE||[]);

// ===== PICKER HELPERS =====
function rerenderGroupPicker(){
  const m=document.getElementById('groupNodePicker');if(!m)return;
  const checked=[...m.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
  // Expand all by default so all levels are visible
  state.tree.forEach(n=>{if(pickerExpandState[n.id]===undefined)pickerExpandState[n.id]=true;});
  m.innerHTML=renderTreeHtml(state.tree,{selectable:false,showCheckbox:true,checkedIds:checked,usePickerExpand:true,showTags:true});
  bindTree(m,{
    onToggle:id=>{pickerExpandState[id]=!(pickerExpandState[id]===true);rerenderGroupPicker();},
    onCheck:(id,chk)=>cascadeCheck(m,state.tree,id,chk)
  });
}
function rerenderApplyPicker(tree){
  const m=document.getElementById('applyNodePicker');if(!m)return;
  const checked=[...m.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
  // Expand all by default so all levels are visible
  tree.forEach(n=>{if(pickerExpandState[n.id]===undefined)pickerExpandState[n.id]=true;});
  m.innerHTML=renderTreeHtml(tree,{selectable:false,showCheckbox:true,checkedIds:checked,usePickerExpand:true,showTags:true});
  bindTree(m,{
    onToggle:id=>{pickerExpandState[id]=!(pickerExpandState[id]===true);rerenderApplyPicker(tree);},
    onCheck:(id,chk)=>cascadeCheck(m,tree,id,chk)
  });
}
function cascadeCheck(container,tree,nodeId,checked){
  // Always cascade both check and uncheck to all descendants
  collectSubIdsFor(tree,nodeId).forEach(id=>{
    const el=container.querySelector(`input[data-ck="${CSS.escape(id)}"]`);
    if(el)el.checked=checked;
  });
  // Sync indeterminate state
  const checkedIds=[...container.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
  syncIndeterminate(container,tree,new Set(checkedIds));
}

// ===== AUTH / PERMISSIONS =====
function canAction(userId,action,nodeId){
  const user=state.users.find(u=>u.id===userId);if(!user)return false;
  if(user.systemRole==='admin')return true;
  return effectiveGrants(userId).some(g=>{const acts=ROLE_ACTIONS[g.role]||[];if(!acts.includes(action))return false;return grantCovers(g,nodeId);});
}
function effectiveGrants(userId){
  return[...state.groupUsers.filter(l=>l.userId===userId).map(l=>state.groupMap[l.groupId]).filter(Boolean).map(g=>({role:g.role,nodeScopes:g.nodeScopes||[],tagScopes:g.tagScopes||[]})),...state.directGrants.filter(d=>d.userId===userId).map(d=>({role:d.role,nodeScopes:d.nodeScopes||[],tagScopes:d.tagScopes||[]}))];
}
function grantCovers(grant,nodeId){
  if((grant.nodeScopes||[]).some(sid=>isDescOrSelf(nodeId,sid)))return true;
  const tags=grant.tagScopes||[];if(!tags.length)return false;
  const nt=inheritedTags(nodeId);return tags.some(t=>nt.includes(t));
}
function isDescOrSelf(nodeId,ancId){let c=nodeId;while(c){if(c===ancId)return true;c=state.nodeMap[c]?state.nodeMap[c].parentId:'';}return false;}
function inheritedTags(nodeId){const tags=[];let c=nodeId;while(c){(getNodeMeta(c).tags||[]).forEach(t=>{if(!tags.includes(t))tags.push(t);});c=state.nodeMap[c]?state.nodeMap[c].parentId:'';}return tags;}
function filterTreeByPerm(tree){
  return tree.map(n=>allowed(n)).filter(Boolean);
  function allowed(node){const ok=canAction(state.currentUser.id,'view',node.id);const kids=(node.children||[]).map(allowed).filter(Boolean);if(!ok&&!kids.length)return null;return{id:node.id,title:node.title,children:kids};}
}
async function userEdit(action,nodeId){
  if(!canAction(state.currentUser.id,'edit_structure',nodeId))return;
  selectedNodeId=nodeId;
  if(action==='sibling')await addNode('sibling');if(action==='child')await addNode('child');
  if(action==='rename')await renameNode();if(action==='delete')await deleteNode();
  refreshState();renderMyPanel();
}

// ===== APPROVAL OPS =====
function approveReq(id){
  const req=state.requests.find(r=>r.id===id);if(!req||req.status!=='pending')return;
  const directs=deepClone(state.directGrants);
  const validType=req.validType||'30d';
  const expiresAt=req.expiresAt||buildExpiry(validType);
  const grantUserId=(state.users||[]).some(u=>u.id===req.userId)?req.userId:(req.requestedBy||req.userId);
  if(!directs.some(d=>d.userId===grantUserId&&d.role===req.targetRole&&sameSet(d.nodeScopes||[],req.nodeScopes||[]))){
    directs.push({id:genId('direct'),userId:grantUserId,role:req.targetRole,nodeScopes:req.nodeScopes||[],tagScopes:req.tagScopes||[],validType,expiresAt,createdAt:nowISO()});
  }
  writeStore(STORE.directGrants,directs);
  writeStore(STORE.requests,state.requests.map(r=>r.id===id?{...r,status:'approved',reviewedBy:state.currentUser.id,reviewedAt:nowISO()}:r));
  refreshState();renderApprovalPanel();
}
function rejectReq(id){
  writeStore(STORE.requests,state.requests.map(r=>r.id===id?{...r,status:'rejected',reviewedBy:state.currentUser.id,reviewedAt:nowISO()}:r));
  refreshState();renderApprovalPanel();
}
function submitApply(){
  const role=document.getElementById('applyRole')?.value;
  const applyNameEl=document.getElementById('applyName');
  const applyUserIdEl=document.getElementById('applyUserId');
  const applyModuleEl=document.getElementById('applyModule');
  const applyEnvEl=document.querySelector('.approval-select');
  const applyScopeEl=document.getElementById('applyScopeWrap');
  const applicantName=applyNameEl?.value.trim()||'';
  const applicantUserId=applyUserIdEl?.value.trim()||'';
  const applyModule=applyModuleEl?.value||'';
  const validType=document.getElementById('applyValidity')?.value||'30d';
  const envs=getCheckedValues('.apply-env-cb');
  const approvers=['A','B','C'];
  const cc=['B'];
  let nodeScopes=[...document.querySelectorAll('#applyNodePicker input[data-ck]:checked')].map(i=>i.dataset.ck);
  let tagScopes=mergeTagsFromApplyUI();
  if(!requireField(!!applicantName,applyNameEl,'请填写申请人姓名'))return;
  if(!requireField(!!applicantUserId,applyUserIdEl,'请填写申请人 userid'))return;
  if(!requireField(envs.length>0,applyEnvEl,'请选择申请环境'))return;
  if(!requireField(!!applyModule,applyModuleEl,'请选择申请模块'))return;
  if(applyModule!=='docs'){nodeScopes=[];tagScopes=[];}
  if(applyModule==='docs'&&!nodeScopes.length&&!tagScopes.length){
    markFieldInvalid(applyScopeEl||applyModuleEl);
    showToast('请至少选择一个权限范围（节点或标签）','warn');
    return;
  }
  const requests=deepClone(state.requests);
  requests.push({id:genId('req'),requestedBy:state.currentUser.id,userId:state.currentUser.id,applicantUserId,targetRole:role,applyModule,validType,expiresAt:buildExpiry(validType),applicantName,envs,nodeScopes,tagScopes,reason:document.getElementById('applyReason')?.value.trim()||'',approvers,cc,status:'pending',createdAt:nowISO()});
  writeStore(STORE.requests,requests);refreshState();renderApplyPanel();
  showToast('申请已提交，等待管理员审批','ok');
}

// ===== TAG MANAGEMENT =====
function collectTagStats(){
  const map={};(state.tagCatalog||[]).forEach(t=>{map[t]={tag:t,count:0};});
  Object.keys(state.nodeMeta).forEach(id=>{(getNodeMeta(id).tags||[]).forEach(t=>{if(!map[t])map[t]={tag:t,count:0};map[t].count++;});});
  return Object.values(map).sort((a,b)=>a.tag.localeCompare(b.tag));
}
function getNodesByTag(tag){return state.nodes.filter(n=>(getNodeMeta(n.id).tags||[]).includes(tag));}
function createTag(){
  const input=document.getElementById('newTagName');
  const t=input?.value.trim();
  if(!requireField(!!t,input,'请输入新标签名'))return;
  writeStore(STORE.tagCatalog,[...new Set([...(state.tagCatalog||[]),t])]);refreshState();selectedTagName=t;renderTagsPanel();showToast('标签已新增','ok');
}
function renameTag(){
  const renameInput=document.getElementById('renameTagName');
  if(!requireField(!!selectedTagName,document.getElementById('tagListBox'),'请先选择标签'))return;
  const nn=renameInput?.value.trim();if(!requireField(!!nn,renameInput,'请输入新标签名'))return;
  const nm=readStore(STORE.nodeMeta,{});Object.keys(nm).forEach(id=>{nm[id].tags=[...new Set((nm[id].tags||[]).map(t=>t===selectedTagName?nn:t))];});
  writeStore(STORE.nodeMeta,nm);writeStore(STORE.tagCatalog,[...new Set((state.tagCatalog||[]).map(t=>t===selectedTagName?nn:t))]);
  refreshState();selectedTagName=nn;renderTagsPanel();
}
async function deleteTag(){
  if(!selectedTagName)return;
  if(!(await askConfirm(`确认删除标签「${selectedTagName}」？将同时从所有已打该标签的节点中移除。`,'删除标签确认')))return;
  const nm=readStore(STORE.nodeMeta,{});Object.keys(nm).forEach(id=>{nm[id].tags=(nm[id].tags||[]).filter(t=>t!==selectedTagName);});
  writeStore(STORE.nodeMeta,nm);writeStore(STORE.tagCatalog,(state.tagCatalog||[]).filter(t=>t!==selectedTagName));
  refreshState();selectedTagName='';renderTagsPanel();
  // Also refresh tree so inline tag chips update
  if(currentTab==='tree')renderTreeLeft();
}
function clearTagNodes(){
  if(!selectedTagName)return;
  const nm=readStore(STORE.nodeMeta,{});Object.keys(nm).forEach(id=>{nm[id].tags=(nm[id].tags||[]).filter(t=>t!==selectedTagName);});
  writeStore(STORE.nodeMeta,nm);refreshState();renderTagsPanel();
}
function removeTagFromNode(nodeId,tag){const m=getNodeMeta(nodeId);patchNodeMeta(nodeId,{tags:(m.tags||[]).filter(t=>t!==tag)});refreshState();renderTagsPanel();}

// ===== GROUP MANAGEMENT =====
function createGroup(){
  const nameEl=document.getElementById('groupName');
  const pickerEl=document.getElementById('groupNodePicker');
  const name=nameEl?.value.trim();const role=document.getElementById('groupRole')?.value;
  const nodeScopes=[...document.querySelectorAll('#groupNodePicker input[data-ck]:checked')].map(i=>i.dataset.ck);
  const tagScopes=mergeTagsFromGroupUI();
  if(!requireField(!!name,nameEl,'请输入组名'))return;
  if(!requireField(nodeScopes.length>0||tagScopes.length>0,pickerEl,'请至少选择节点或标签范围'))return;
  if(state.groups.some(g=>g.name===name)){markFieldInvalid(nameEl);showToast('组名已存在','warn');return;}
  writeStore(STORE.groups,[...deepClone(state.groups),{id:genId('group'),name,role,nodeScopes,tagScopes,createdAt:nowISO()}]);
  refreshState();renderGroupsPanel();showToast('权限组创建成功','ok');
}
function deleteGroup(id){
  writeStore(STORE.groups,state.groups.filter(g=>g.id!==id));
  writeStore(STORE.groupUsers,state.groupUsers.filter(x=>x.groupId!==id));
  refreshState();renderGroupsPanel();
}
async function renameGroup(id){
  const target=(state.groups||[]).find(g=>g.id===id);
  if(!target)return;
  const nextName=((await askPrompt('请输入新的权限组名称',target.name,'重命名权限组'))||'').trim();
  if(!nextName)return;
  if((state.groups||[]).some(g=>g.id!==id&&g.name===nextName)){showToast('组名已存在','warn');return;}
  writeStore(STORE.groups,(state.groups||[]).map(g=>g.id===id?{...g,name:nextName}:g));
  refreshState();renderGroupsPanel();showToast('权限组已重命名','ok');
}
function batchGrantUsers(){
  const userInput=document.getElementById('batchUserIds');
  const picker=document.getElementById('userGroupPicker');
  const userIds=normalizeList(userInput?.value||'');
  const validType=document.getElementById('batchGrantValidity')?.value||'30d';
  const expiresAt=buildExpiry(validType);
  const groupIds=[...document.querySelectorAll('#userGroupPicker input:checked')].map(i=>i.value);
  if(!requireField(userIds.length>0,userInput,'请输入用户ID'))return;
  if(!requireField(groupIds.length>0,picker,'请勾选权限组'))return;
  const users=deepClone(state.users);
  userIds.forEach(id=>{if(!users.some(u=>u.id===id))users.push({id,name:id,password:'user123',systemRole:'user'});});
  writeStore(STORE.users,users);
  const links=deepClone(state.groupUsers);
  userIds.forEach(uid=>groupIds.forEach(gid=>{if(!links.some(l=>l.userId===uid&&l.groupId===gid))links.push({id:genId('link'),userId:uid,groupId:gid,validType,expiresAt,createdAt:nowISO()});}));
  writeStore(STORE.groupUsers,links);refreshState();renderUsersPanel();showToast('批量授权完成','ok');
}

// ===== TREE DATA =====
function convertTreeFromData(data){
  return data.map(s=>({id:genId('node'),title:s.category,children:(s.groups||[]).map(g=>({id:genId('node'),title:g.title,children:(g.items||[]).map(i=>({id:genId('node'),title:i,children:[]}))}))}));
}
