<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WPS 文档功能中心后台 V2</title>
  <!-- JSZip for .docx text extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root { --bg:#f3f5f9;--card:#fff;--line:#e6eaf2;--text:#1b2430;--muted:#667085;--brand:#2b64ea;--danger:#b42318;--ok:#067647;--warn:#b54708;--shadow:0 8px 24px rgba(15,23,42,.05); }
    *{box-sizing:border-box;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;font-size:13px;line-height:1.45;}
    .hidden{display:none!important;}
    .topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;box-shadow:0 1px 0 rgba(15,23,42,.02);}
    .topbar strong{font-size:15px;letter-spacing:.2px;} .topbar small{color:var(--muted);margin-left:8px;font-weight:500;}
    .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .muted{color:var(--muted);font-size:12px;}
    .ok{color:var(--ok);}.warn{color:var(--warn);}.danger{color:var(--danger);}
    input,select,textarea,button{font:inherit;border:1px solid #cfd7e6;border-radius:8px;background:#fff;padding:8px 10px;transition:all .15s ease;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#91b6ff;box-shadow:0 0 0 3px rgba(43,100,234,.12);}
    textarea{width:100%;resize:vertical;}
    button{cursor:pointer;color:#1d4ed8;border-color:#cfe0ff;background:#f5f9ff;font-weight:500;}
    button:disabled{cursor:not-allowed;color:#98a2b3;border-color:#e2e8f0;background:#f8fafc;}
    .btn-danger{color:var(--danger);border-color:#fecaca;background:#fff1f2;}
    .btn-danger:hover{background:#ffe4e8;}
    .btn-ghost{color:#334155;border-color:#d5dceb;background:#fff;}
    .btn-ghost:hover{background:#f8fafc;}
    .btn-ok{color:var(--ok);border-color:#a7f3d0;background:#ecfdf5;}
    .btn-primary{color:#fff;border-color:#2b64ea;background:#2b64ea;font-weight:600;box-shadow:0 4px 12px rgba(43,100,234,.25);}
    .btn-primary:hover{background:#2456ca;border-color:#2456ca;}
    .tabs{max-width:1480px;margin:8px auto 0;padding:0 14px;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;}
    .tab{border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px 10px;font-size:12px;cursor:pointer;color:#475467;font-weight:600;}
    .tab:hover{border-color:#cfe0ff;background:#f8fbff;}
    .tab.active{border-color:#bfd5ff;background:#edf3ff;color:#1d4ed8;font-weight:700;}
    .app{max-width:1480px;margin:10px auto 16px;padding:0 14px;}
    .card{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
    .card h3{margin:0 0 10px;font-size:14px;letter-spacing:.2px;}
    .split{display:grid;grid-template-columns:360px 1fr;gap:12px;}
    .split-full-h{height:calc(100vh - 130px);}
    .split-eq{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .tree{border:1px solid var(--line);border-radius:10px;background:#fff;padding:8px;overflow:auto;}
    #treeManage{border:1px solid var(--line);border-radius:10px;background:#fff;padding:8px;}
    .tree-row{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:8px;margin:2px 0;}
    .tree-row:hover{background:#f3f6fc;} .tree-row.sel{background:#eaf1ff;}
    .tree-title-btn{border:0;background:transparent;color:inherit;padding:2px 4px;cursor:pointer;text-align:left;border-radius:4px;flex:1;}
    .tree-toggle{border:0;background:transparent;color:#334155;width:20px;height:20px;padding:0;line-height:1;cursor:pointer;}
    .tree-children{margin-left:18px;}
    .table-wrap{border:1px solid var(--line);border-radius:10px;overflow:auto;max-height:420px;background:#fff;}
    .table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;}
    .table th,.table td{border-bottom:1px solid var(--line);padding:8px 8px;text-align:left;vertical-align:top;}
    .table th{background:#f8faff;position:sticky;top:0;z-index:1;color:#475467;font-weight:700;}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border:1px solid #dbeafe;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:11px;margin-right:4px;margin-bottom:4px;}
    .lock{border:1px dashed #fda4af;background:#fff1f2;color:#9f1239;border-radius:8px;padding:12px;font-size:13px;}
    .status-pending{color:var(--warn);}.status-approved{color:var(--ok);}.status-rejected{color:var(--danger);}
    .near-expiry{color:#c2410c;font-weight:700;background:#fff7ed;border:1px solid #fdba74;border-radius:999px;padding:2px 8px;}
    .admin-layout{max-width:1480px;margin:10px auto 16px;padding:0 14px;display:grid;grid-template-columns:188px 1fr;gap:12px;align-items:start;}
    .module-sidebar{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;position:sticky;top:68px;box-shadow:var(--shadow);}
    .module-item{width:100%;text-align:left;border:1px solid #edf1f7;background:#fff;border-radius:10px;padding:9px 10px;margin-bottom:7px;cursor:pointer;font-size:12px;color:#475467;}
    .module-item:hover{border-color:#d8e5ff;background:#f9fbff;}
    .module-item.active{border-color:#bfd5ff;background:#edf3ff;color:#1d4ed8;font-weight:700;}
    .module-item .meta{display:block;font-size:10px;color:#98a2b3;margin-top:2px;}
    .admin-main .tabs{margin-top:0;max-width:none;padding:0;grid-template-columns:repeat(6,minmax(0,1fr));}
    .admin-main .app{max-width:none;margin:10px 0 0;padding:0;}
    .scope-details{border:1px solid var(--line);border-radius:10px;background:#fbfdff;margin-bottom:10px;}
    .scope-details>summary{cursor:pointer;padding:10px 12px;font-size:13px;font-weight:600;color:#334155;list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px;}
    .scope-details>summary::-webkit-details-marker{display:none;}
    .scope-details>summary::after{content:"▾";font-size:11px;color:var(--muted);}
    .scope-details:not([open])>summary::after{content:"▸";}
    .scope-details.has-zoom>summary{justify-content:flex-start;}
    .scope-details.has-zoom>summary .scope-zoom-trigger{margin-left:auto;}
    .scope-details.has-zoom>summary::after{margin-left:8px;}
    .scope-details .scope-body{padding:0 10px 10px;}
    .scope-scroll{max-height:200px;overflow:auto;border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px;}
    .scope-scroll .tree{max-height:none;border:0;padding:4px;}
    .scope-zoom-mask{position:fixed;inset:0;z-index:1250;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;padding:16px;}
    .scope-zoom-panel{width:min(1600px,98vw);height:min(94vh,1100px);background:#fff;border:1px solid #dbe3ef;border-radius:12px;box-shadow:0 24px 70px rgba(15,23,42,.32);display:flex;flex-direction:column;overflow:hidden;}
    .scope-zoom-head{padding:12px 14px;border-bottom:1px solid #e8edf5;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;font-weight:700;color:#0f172a;}
    .scope-zoom-body{padding:12px 14px;display:grid;grid-template-rows:minmax(420px,1fr) minmax(220px,.5fr);gap:10px;overflow:auto;}
    .scope-zoom-tree-wrap,.scope-zoom-tag-wrap{border:1px solid var(--line);border-radius:10px;background:#f8fbff;display:flex;flex-direction:column;min-height:0;}
    .scope-zoom-title{padding:8px 10px;font-size:12px;color:#64748b;border-bottom:1px solid #e8edf5;background:#fff;}
    .scope-zoom-tree{flex:1;overflow:auto;padding:8px;background:#fff;}
    .scope-zoom-tags{flex:1;overflow:auto;padding:8px;background:#fff;}
    .scope-zoom-actions{padding:12px 14px;border-top:1px solid #e8edf5;display:flex;justify-content:flex-end;gap:8px;}
    .tag-subdetails{border:1px solid #e2e8f0;border-radius:8px;background:#fff;margin-bottom:8px;}
    .tag-subdetails>summary{cursor:pointer;padding:8px 10px;font-size:12px;font-weight:600;color:#475467;}
    .tag-subdetails>summary::-webkit-details-marker{display:none;}
    .tag-pick-grid{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center;}
    .tag-pick-grid label{font-size:12px;display:inline-flex;align-items:center;gap:4px;}

    /* workflow */
    .wf-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
    .wf-tab{border:1px solid var(--line);background:#fff;color:#475467;border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;}
    .wf-tab:hover{border-color:#bfdbfe;color:var(--brand);}
    .wf-tab.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;font-weight:600;}
    .wf-tab.done{border-color:#a7f3d0;color:var(--ok);background:#f0fdf4;}
    .wf-tab.stale-tab{border-color:#fdba74;color:#c2410c;background:#fff7ed;}
    .wf-panel{border:1px solid var(--line);border-radius:8px;background:#fbfdff;padding:10px;}
    .prd-dropzone{border:2px dashed #bfdbfe;border-radius:8px;background:#eff6ff;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;}
    .prd-dropzone:hover{border-color:var(--brand);background:#e0eeff;}
    .prd-dropzone .dz-icon{font-size:28px;margin-bottom:8px;}
    .prd-dropzone .dz-text{font-size:13px;color:#1d4ed8;font-weight:500;}
    .prd-dropzone .dz-sub{font-size:11px;color:var(--muted);margin-top:4px;}
    .prd-badge{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:#166534;}
    .pipeline-phases{margin-top:10px;}
    .pipeline-phase{display:flex;align-items:flex-start;gap:8px;padding:8px;border-radius:6px;margin-bottom:4px;}
    .phase-pending{color:#9ca3af;} .phase-running{background:#eff6ff;color:#1d4ed8;animation:pulse 1s ease-in-out infinite;} .phase-done{background:#f0fdf4;color:var(--ok);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .phase-icon{font-size:14px;flex-shrink:0;margin-top:1px;} .phase-name{font-size:12px;font-weight:600;} .phase-desc{font-size:11px;margin-top:2px;opacity:.8;}
    .lang-edit-tabs{display:flex;gap:4px;margin-bottom:8px;}
    .lang-edit-tab{border:1px solid var(--line);background:#fff;color:#475467;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;}
    .lang-edit-tab.active{background:var(--brand);color:#fff;border-color:var(--brand);}
    .lang-edit-tab.has-c{border-color:#a7f3d0;color:var(--ok);}
    .lang-edit-tab.active.has-c{background:var(--ok);border-color:var(--ok);color:#fff;}
    .tl-grid{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:8px;}
    .tl-row{display:grid;grid-template-columns:90px 1fr auto;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line);font-size:12px;}
    .tl-row:last-child{border-bottom:none;} .tl-row:nth-child(even){background:#fafbff;}
    .tl-badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid;}
    .tl-source{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;}
    .tl-done{background:#f0fdf4;color:var(--ok);border-color:#a7f3d0;}
    .tl-pending{background:#fafafa;color:#9ca3af;border-color:#e5e7eb;}
    .tl-running{background:#fffbeb;color:var(--warn);border-color:#fde68a;animation:pulse 1s ease-in-out infinite;}
    .pub-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
    .pub-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;}
    .pub-row label{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;}
    .pub-url{font-family:monospace;font-size:11px;color:#6b7280;}
    .pub-badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid;}
    .pub-live{background:#f0fdf4;color:var(--ok);border-color:#a7f3d0;}
    .pub-draft{background:#fffbeb;color:var(--warn);border-color:#fde68a;}
    .pub-none{background:#fafafa;color:#9ca3af;border-color:#e5e7eb;}
    .deploy-log{background:#0f172a;color:#94a3b8;border-radius:8px;padding:12px;font-family:monospace;font-size:11px;line-height:1.8;max-height:180px;overflow-y:auto;margin-top:8px;}
    .log-ok{color:#4ade80;} .log-info{color:#60a5fa;}

    /* login */
    .login-overlay{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,#0f172a,#1e40af);display:flex;align-items:center;justify-content:center;}
    .login-box{background:#fff;border-radius:14px;padding:36px 40px;width:400px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.35);}
    .login-box h2{margin:0 0 6px;font-size:22px;font-weight:700;}
    .login-box p{margin:0 0 24px;color:var(--muted);font-size:13px;}
    .lf{margin-bottom:14px;}
    .lf label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#374151;}
    .lf input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;}
    .lf input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
    .login-err{background:#fff1f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;font-size:13px;color:var(--danger);margin-bottom:12px;display:none;}
    .login-btn{width:100%;padding:11px;font-size:15px;font-weight:600;color:#fff;background:var(--brand);border:none;border-radius:8px;cursor:pointer;}
    .login-btn:hover{background:#1d4ed8;}
    .login-hints{margin-top:16px;font-size:12px;color:var(--muted);}
    .login-hints span{display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid var(--line);border-radius:4px;padding:4px 8px;margin:4px 4px 0 0;cursor:pointer;}
    .login-hints span:hover{background:#eff6ff;color:var(--brand);}

    @media(max-width:1220px){.tabs{grid-template-columns:repeat(3,minmax(0,1fr));}.split,.split-eq{grid-template-columns:1fr;}.split-full-h{height:auto;}.tree{max-height:360px;}.admin-layout{grid-template-columns:1fr;}.module-sidebar{position:static;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;}.module-item{margin-bottom:0;}}

    /* api modal */
    .api-modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;}
    .api-modal-box{background:#fff;border-radius:12px;padding:28px 32px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.25);}
    .api-modal-box h3{margin:0 0 4px;font-size:18px;}
    .api-modal-box p{margin:0 0 20px;color:var(--muted);font-size:13px;}
    .api-lf{margin-bottom:14px;}
    .api-lf label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;color:#374151;}
    .api-lf label span{font-weight:400;color:var(--muted);}
    .api-lf input,.api-lf select{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:7px;font-size:13px;}
    .api-lf input:focus,.api-lf select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .api-note{font-size:11px;color:var(--muted);margin-top:4px;}
    .api-status{font-size:12px;padding:6px 10px;border-radius:5px;margin-bottom:12px;}
    .api-status.ok{background:#f0fdf4;color:#166534;border:1px solid #a7f3d0;}
    .api-status.warn{background:#fffbeb;color:#92400e;border:1px solid #fde68a;}

    /* lightweight approval form */
    .approval-form-shell{max-width:980px;margin:0 auto;background:#fff;border:1px solid #edf1f7;border-radius:10px;overflow:hidden;}
    .approval-form-head{padding:12px 18px;border-bottom:1px solid #edf1f7;font-size:13px;font-weight:600;color:#344054;}
    .approval-form-body{padding:18px 20px 82px;}
    .approval-field{margin-bottom:16px;}
    .approval-field label{display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:8px;}
    .approval-field label .req{color:#e11d48;margin-left:4px;}
    .approval-input,.approval-field select,.approval-field textarea{width:100%;border:1px solid #d8dee8;border-radius:6px;background:#fff;padding:9px 10px;color:#1f2329;font-size:13px;}
    .approval-input:focus,.approval-field textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .approval-select{border:1px solid #d8dee8;border-radius:7px;background:#fff;}
    .approval-select[open]{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);}
    .approval-select summary{list-style:none;cursor:pointer;padding:10px 12px;color:#98a2b3;display:flex;align-items:center;justify-content:space-between;}
    .approval-select summary::-webkit-details-marker{display:none;}
    .approval-select summary:after{content:"⌄";font-size:14px;color:#667085;}
    .approval-select[open] summary:after{content:"⌃";}
    .approval-menu{border-top:1px solid #eef2f7;max-height:260px;overflow:auto;padding:8px;background:#fff;box-shadow:0 10px 24px rgba(15,23,42,.08);}
    .approval-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;font-size:13px;cursor:pointer;}
    .approval-option:hover{background:#f5f7fb;}
    .approval-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .approval-check{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid #d8dee8;border-radius:8px;background:#fff;cursor:pointer;}
    .approval-check:hover{border-color:#bfdbfe;background:#f8fbff;}
    .approval-check.single{grid-template-columns:1fr;}
    .approval-flow{display:grid;grid-template-columns:130px 1fr;gap:14px;margin-top:6px;}
    .approval-flow-line{position:relative;padding-left:18px;}
    .approval-flow-line:before{content:"";position:absolute;left:5px;top:15px;bottom:-18px;border-left:1px solid #dbe3ef;}
    .approval-flow-line:last-child:before{display:none;}
    .approval-dot{position:absolute;left:0;top:4px;width:10px;height:10px;background:#2563eb;border-radius:50%;box-shadow:0 0 0 3px #eff6ff;}
    .approval-step-title{font-size:13px;font-weight:600;margin-bottom:2px;}
    .approval-step-sub{font-size:11px;color:#667085;}
    .approval-people{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .approval-person{display:inline-flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:#475467;}
    .approval-avatar{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:flex;align-items:center;justify-content:center;color:#1d4ed8;font-weight:700;border:1px solid #dbeafe;}
    .approval-plus{width:28px;height:28px;border:1px solid #d8dee8;border-radius:7px;background:#fff;color:#475467;font-size:18px;display:inline-flex;align-items:center;justify-content:center;}
    .approval-actions{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 18px;display:flex;justify-content:flex-end;gap:8px;}
    .approval-record-card{border:1px solid #edf1f7;border-radius:10px;background:#fff;padding:14px;}
    .field-error{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.16)!important;background:#fff8f8!important;}
    .field-shake{animation:field-shake .22s linear 2;}
    @keyframes field-shake{0%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}100%{transform:translateX(0)}}
    .ui-toast-wrap{position:fixed;left:50%;top:74px;transform:translateX(-50%);z-index:1200;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:center;}
    .ui-toast{min-width:220px;max-width:420px;padding:10px 12px;border-radius:10px;background:#111827;color:#fff;box-shadow:0 12px 30px rgba(15,23,42,.25);font-size:12px;line-height:1.45;opacity:0;transform:translateY(-8px);transition:all .2s ease;}
    .ui-toast.show{opacity:1;transform:translateY(0);}
    .ui-toast.warn{background:#7c2d12;}
    .ui-toast.ok{background:#166534;}
    .ui-dialog-mask{position:fixed;inset:0;z-index:1300;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:16px;}
    .ui-dialog-mask.hidden{display:none;}
    .ui-dialog{width:420px;max-width:95vw;border:1px solid #dbe3ef;border-radius:12px;background:#fff;box-shadow:0 30px 70px rgba(15,23,42,.3);overflow:hidden;}
    .ui-dialog-head{padding:12px 14px;border-bottom:1px solid #e8edf5;font-size:14px;font-weight:700;color:#0f172a;}
    .ui-dialog-body{padding:14px;color:#334155;font-size:13px;line-height:1.6;white-space:pre-wrap;}
    .ui-dialog-input{width:100%;margin-top:10px;}
    .ui-dialog-actions{padding:12px 14px;border-top:1px solid #e8edf5;display:flex;justify-content:flex-end;gap:8px;}
  </style>
</head>
<body>

// ===== UTILS =====
function esc(t){return String(t||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
function genId(p){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);}
function nowISO(){return new Date().toISOString();}
const DAY_MS=24*60*60*1000;
function simpleHash(s){let h=0;for(let i=0;i<Math.min(s.length,2000);i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return h.toString(36);}
function deepClone(v){return JSON.parse(JSON.stringify(v));}
function readStore(k,fb){try{const r=localStorage.getItem(k);return r==null?fb:JSON.parse(r);}catch(_){return fb;}}
function writeStore(k,v){localStorage.setItem(k,JSON.stringify(v));}
function normalizeList(s){return[...new Set(String(s||'').split(/[,\n]/).map(v=>v.trim()).filter(Boolean))];}
function normalizeHttpUrl(v){const s=String(v||'').trim();return s&&/^https?:\/\//i.test(s)?s:'';}
function sameSet(a,b){if(a.length!==b.length)return false;const x=[...a].sort(),y=[...b].sort();return x.every((v,i)=>v===y[i]);}
let uiToastWrap=null;
let uiDialogMask=null;
let uiDialogResolve=null;
function ensureUiFeedback(){
  if(!uiToastWrap){
    uiToastWrap=document.createElement('div');
    uiToastWrap.className='ui-toast-wrap';
    document.body.appendChild(uiToastWrap);
  }
  if(!uiDialogMask){
    uiDialogMask=document.createElement('div');
    uiDialogMask.className='ui-dialog-mask hidden';
    uiDialogMask.innerHTML=`<div class="ui-dialog" role="dialog" aria-modal="true">
      <div class="ui-dialog-head" id="uiDialogTitle">请确认</div>
      <div class="ui-dialog-body" id="uiDialogBody"></div>
      <div class="ui-dialog-actions">
        <button id="uiDialogCancelBtn" class="btn-ghost">取消</button>
        <button id="uiDialogOkBtn" class="btn-primary">确定</button>
      </div>
    </div>`;
    document.body.appendChild(uiDialogMask);
  }
}
function showToast(message,type='warn'){
  ensureUiFeedback();
  const toast=document.createElement('div');
  toast.className=`ui-toast ${type}`;
  toast.textContent=String(message||'请完善信息');
  uiToastWrap.appendChild(toast);
  requestAnimationFrame(()=>toast.classList.add('show'));
  setTimeout(()=>{
    toast.classList.remove('show');
    setTimeout(()=>toast.remove(),220);
  },2200);
}
function markFieldInvalid(el){
  if(!el)return;
  const target=el.matches('.approval-select')?el:el.closest('.approval-select')||el;
  target.classList.add('field-error','field-shake');
  setTimeout(()=>target.classList.remove('field-shake'),520);
  const clear=()=>target.classList.remove('field-error');
  ['input','change','click','blur'].forEach(ev=>el.addEventListener(ev,clear,{once:true}));
}
function requireField(ok,el,msg){
  if(ok)return true;
  markFieldInvalid(el);
  showToast(msg||'请完善必填项','warn');
  return false;
}
function openDialog(opts={}){
  ensureUiFeedback();
  if(uiDialogResolve){uiDialogResolve({ok:false,value:null});uiDialogResolve=null;}
  const mode=opts.mode||'confirm';
  const titleEl=document.getElementById('uiDialogTitle');
  const bodyEl=document.getElementById('uiDialogBody');
  const okBtn=document.getElementById('uiDialogOkBtn');
  const cancelBtn=document.getElementById('uiDialogCancelBtn');
  if(!titleEl||!bodyEl||!okBtn||!cancelBtn)return Promise.resolve(mode==='prompt'?null:false);
  titleEl.textContent=opts.title||'请确认';
  bodyEl.innerHTML='';
  const msg=document.createElement('div');
  msg.textContent=String(opts.message||'');
  bodyEl.appendChild(msg);
  let inputEl=null;
  if(mode==='prompt'){
    inputEl=document.createElement('input');
    inputEl.className='ui-dialog-input';
    inputEl.type='text';
    inputEl.placeholder=opts.placeholder||'请输入';
    inputEl.value=opts.defaultValue||'';
    bodyEl.appendChild(inputEl);
  }
  okBtn.textContent=opts.okText||'确定';
  cancelBtn.textContent=opts.cancelText||'取消';
  cancelBtn.classList.toggle('hidden',mode==='alert');
  uiDialogMask.classList.remove('hidden');
  return new Promise(resolve=>{
    uiDialogResolve=resolve;
    const done=(ok)=>{
      uiDialogMask.classList.add('hidden');
      okBtn.removeEventListener('click',onOk);
      cancelBtn.removeEventListener('click',onCancel);
      uiDialogMask.removeEventListener('click',onMask);
      window.removeEventListener('keydown',onEsc,true);
      uiDialogResolve=null;
      if(mode==='prompt')resolve(ok?(inputEl?.value??''):null);
      else resolve(!!ok);
    };
    const onOk=()=>done(true);
    const onCancel=()=>done(false);
    const onMask=(e)=>{if(e.target===uiDialogMask)done(false);};
    const onEsc=(e)=>{if(e.key==='Escape')done(false);if(e.key==='Enter'&&mode==='prompt')done(true);};
    okBtn.addEventListener('click',onOk);
    cancelBtn.addEventListener('click',onCancel);
    uiDialogMask.addEventListener('click',onMask);
    window.addEventListener('keydown',onEsc,true);
    setTimeout(()=>inputEl?inputEl.focus():okBtn.focus(),0);
  });
}
function askConfirm(message,title='请确认'){return openDialog({mode:'confirm',title,message,okText:'确定',cancelText:'取消'});}
function askPrompt(message,defaultValue='',title='请输入'){return openDialog({mode:'prompt',title,message,defaultValue,okText:'确定',cancelText:'取消'});}
function allCatalogTags(){
  const tagsFromNodeMeta=Object.values(state.nodeMeta||{}).flatMap(m=>Array.isArray(m?.tags)?m.tags:[]);
  return [...new Set([...(state.tagCatalog||[]),...tagsFromNodeMeta])].sort((a,b)=>a.localeCompare(b));
}
function openScopeZoom(opts){
  const title=opts?.title||'权限范围大屏查看';
  const tree=deepClone(opts?.tree||state.tree||[]);
  let checkedNodeIds=[...(opts?.checkedNodeIds||[])];
  let checkedTagVals=[...(opts?.checkedTagVals||[])];
  const tags=[...(opts?.tags||allCatalogTags())];
  const mask=document.createElement('div');
  mask.className='scope-zoom-mask';
  mask.innerHTML=`<div class="scope-zoom-panel">
    <div class="scope-zoom-head"><span>${esc(title)}</span><button type="button" class="btn-ghost" data-sz-close>关闭</button></div>
    <div class="scope-zoom-body">
      <section class="scope-zoom-tree-wrap">
        <div class="scope-zoom-title">文档中心节点</div>
        <div id="scopeZoomTree" class="scope-zoom-tree"></div>
      </section>
      <section class="scope-zoom-tag-wrap">
        <div class="scope-zoom-title">标签</div>
        <div id="scopeZoomTags" class="scope-zoom-tags"></div>
      </section>
    </div>
    <div class="scope-zoom-actions"><button type="button" class="btn-ghost" data-sz-cancel>取消</button><button type="button" class="btn-primary" data-sz-apply>应用</button></div>
  </div>`;
  document.body.appendChild(mask);
  const treeBox=mask.querySelector('#scopeZoomTree');
  const tagBox=mask.querySelector('#scopeZoomTags');
  const expandMap={};
  (function openAll(nodes){(nodes||[]).forEach(n=>{expandMap[n.id]=true;openAll(n.children||[]);});})(tree);
  Object.keys(expandMap).forEach(id=>{pickerExpandState[id]=expandMap[id];});
  function drawTree(){
    if(!treeBox)return;
    treeBox.innerHTML=renderTreeHtml(tree,{selectable:false,showCheckbox:true,checkedIds:checkedNodeIds,usePickerExpand:true,showTags:true});
    bindTree(treeBox,{
      onToggle:id=>{expandMap[id]=!(expandMap[id]===true);pickerExpandState[id]=expandMap[id];drawTree();},
      onCheck:(id,chk)=>{
        cascadeCheck(treeBox,tree,id,chk);
        checkedNodeIds=[...treeBox.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
      }
    });
    syncIndeterminate(treeBox,tree,new Set(checkedNodeIds));
    checkedNodeIds=[...treeBox.querySelectorAll('input[data-ck]:checked')].map(i=>i.dataset.ck);
  }
  function drawTags(){
    if(!tagBox)return;
    tagBox.innerHTML=tags.length?`<div class="tag-pick-grid">${tags.map(t=>`<label><input type="checkbox" class="scope-zoom-tag-cb" value="${esc(t)}"${checkedTagVals.includes(t)?' checked':''}/> ${esc(t)}</label>`).join('')}</div>`:'<div class="muted">暂无标签</div>';
    tagBox.querySelectorAll('.scope-zoom-tag-cb').forEach(cb=>cb.addEventListener('change',()=>{
      checkedTagVals=[...tagBox.querySelectorAll('.scope-zoom-tag-cb:checked')].map(i=>i.value);
    }));
  }
  drawTree();
  drawTags();
  const close=()=>mask.remove();
  mask.querySelector('[data-sz-close]')?.addEventListener('click',close);
  mask.querySelector('[data-sz-cancel]')?.addEventListener('click',close);
  mask.addEventListener('click',e=>{if(e.target===mask)close();});
  mask.querySelector('[data-sz-apply]')?.addEventListener('click',()=>{

function buildExpiry(validType){
  if(validType==='30d'){return new Date(Date.now()+30*DAY_MS).toISOString();}
  return '';
}
function isExpired(expiresAt){
  if(!expiresAt)return false;
  const t=Date.parse(expiresAt);
  return Number.isFinite(t)&&t<=Date.now();
}
function remainingDays(expiresAt){
  if(!expiresAt)return Infinity;
  const t=Date.parse(expiresAt);
  if(!Number.isFinite(t))return Infinity;
  return Math.ceil((t-Date.now())/DAY_MS);
}
function validityText(validType,expiresAt){
  if(validType==='longterm'||!expiresAt)return'长期';
  const days=remainingDays(expiresAt);
  if(days<=0)return'已过期';
  return`${days}天`;
}

// ===== LLM CALLER (OpenAI-compatible streaming) =====
async function callLLM(systemPrompt, userPrompt, onChunk) {
  const s = getApiSettings();
  if (!s.apiKey) throw new Error('no_api_key');
  const baseUrl = (s.baseUrl || 'https://api.openai.com/v1').replace(/\/$/, '');
  const model = s.model || 'gpt-4o-mini';
  const resp = await fetch(`${baseUrl}/chat/completions`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${s.apiKey.trim()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model, stream: true, temperature: 0.3, max_tokens: 8000,
      messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userPrompt }]
    })
  });
  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`API ${resp.status}: ${errText.slice(0, 200)}`);
  }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of decoder.decode(value, { stream: true }).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') break;
      try {
        const delta = JSON.parse(data).choices?.[0]?.delta?.content || '';
        if (delta) { fullText += delta; if (onChunk) onChunk(delta, fullText); }
      } catch (_) {}
    }
  }
  return fullText;
}

}

  const systemPrompt = SKILL_TRANSLATE_PROMPT(names[targetLangCode] || targetLangCode, targetLangCode);

// O(n) flat — builds pathText during traversal
function flattenTree(tree){
  const nodes=[],nodeMap={};
  function go(node,level,parentId,pPath){
    const pathText=pPath?pPath+' / '+node.title:node.title;
    const item={id:node.id,title:node.title,level,parentId,pathText};
    nodes.push(item);nodeMap[item.id]=item;
    (node.children||[]).forEach(c=>go(c,level+1,node.id,pathText));
  }
  tree.forEach(n=>go(n,1,'',''));
  return{nodes,nodeMap};
}

function buildState(){
  const users=readStore(STORE.users,[]);
  const userIdSet=new Set((users||[]).map(u=>u.id));
  const uid=localStorage.getItem(STORE.sessionUserId)||'';
  const currentUser=users.find(u=>u.id===uid)||null;
  const tree=readStore(STORE.tree,[]);
  const nodeMeta=readStore(STORE.nodeMeta,{});
  const tagCatalog=readStore(STORE.tagCatalog,[]);
  const groups=readStore(STORE.groups,[]);
  const rawGroupUsers=readStore(STORE.groupUsers,[]);
  const rawDirectGrants=readStore(STORE.directGrants,[]);
  const requests=readStore(STORE.requests,[]);
  // Migration: old approval used applicant employee id as grant user id (e.g. 123456).
  // If grant userId no longer matches a real account, remap to request.requestedBy login id.
  const migratedDirectGrants=(rawDirectGrants||[]).map(d=>{
    if(userIdSet.has(d.userId))return d;
    const matched=(requests||[]).find(r=>
      r.status==='approved'&&
      r.userId===d.userId&&
      r.targetRole===d.role&&
      sameSet(r.nodeScopes||[],d.nodeScopes||[])&&
      sameSet(r.tagScopes||[],d.tagScopes||[])&&
      r.requestedBy&&userIdSet.has(r.requestedBy)
    );
    return matched?{...d,userId:matched.requestedBy}:d;
  });
  if(JSON.stringify(migratedDirectGrants)!==JSON.stringify(rawDirectGrants)){
    writeStore(STORE.directGrants,migratedDirectGrants);
  }
  const groupUsers=(rawGroupUsers||[]).filter(x=>!isExpired(x.expiresAt));
  const directGrants=(migratedDirectGrants||[]).filter(x=>!isExpired(x.expiresAt));
  if(groupUsers.length!==(rawGroupUsers||[]).length)writeStore(STORE.groupUsers,groupUsers);
  if(directGrants.length!==(migratedDirectGrants||[]).length)writeStore(STORE.directGrants,directGrants);
  const{nodes,nodeMap}=flattenTree(tree);
  const groupMap={};groups.forEach(g=>{groupMap[g.id]=g;});
  return{users,currentUser,tree,nodeMeta,tagCatalog,groups,groupUsers,directGrants,requests,nodes,nodeMap,groupMap};
}

// ===== TREE RENDER (NO flattenTree per node) =====
function renderTreeHtml(treeNodes,opts={}){
  const search=(opts.search||'').toLowerCase();
  const checkedSet=new Set(opts.checkedIds||[]); // O(1) lookup
  // Build node-to-tags map from nodeMeta for inline display
  const tagMap=opts.showTags?((id)=>{const m=(state.nodeMeta||{})[id];return(m&&m.tags&&m.tags.length)?m.tags:[];}):(()=>[]);
  const parts=[];
  treeNodes.forEach(n=>renderNode(n,1,parts));
  return parts.join('')||'<div class="muted">无匹配节点</div>';

  function matches(node){
    if(`${node.title} ${node.id}`.toLowerCase().includes(search))return true;
    return(node.children||[]).some(c=>matches(c));
  }
  function renderNode(node,level,out){
    if(search&&!matches(node))return;
    const isOpen=opts.usePickerExpand?pickerExpandState[node.id]===true:expandState[node.id]!==false;
    const hasKids=(node.children||[]).length>0;
    const checked=checkedSet.has(node.id);
    const active=opts.selectedId===node.id;
    const disabled=opts.disabledIds&&opts.disabledIds.has(node.id);
    const nodeTags=tagMap(node.id);
    const tagHtml=nodeTags.length?`<span style="margin-left:4px;font-size:10px;color:#6b7280;opacity:0.85;">${nodeTags.map(t=>`<span style="background:#f3f4f6;border-radius:3px;padding:0 3px;">${esc(t)}</span>`).join('')}</span>`:'';
    const rowStyle=`padding-left:${(level-1)*14}px${disabled?';opacity:0.35;':''}`; 
    const titleStyle=disabled?'cursor:not-allowed;color:#9ca3af;':'';
    out.push(`<div class="tree-node-wrap" data-nw="${esc(node.id)}"><div class="tree-row${active?' sel':''}" style="${rowStyle}"><button class="tree-toggle" data-tg="${esc(node.id)}">${hasKids?(isOpen?'▾':'▸'):''}</button>${opts.showCheckbox?`<input type="checkbox" data-ck="${esc(node.id)}"${checked?' checked':''}/>`:''}<button class="tree-title-btn" data-sel="${esc(node.id)}"${disabled?' title="无权限操作此节点"':''} style="${titleStyle}">${esc(node.title)}</button>${tagHtml}</div>${hasKids?`<div class="tree-children${isOpen?'':' hidden'}" data-ch="${esc(node.id)}">${(()=>{const sub=[];(node.children||[]).forEach(c=>renderNode(c,level+1,sub));return sub.join('');})()}</div>`:''}</div>`);
  }
}

function bindTree(container,handlers){
  if(!container)return;
  container.querySelectorAll('[data-tg]').forEach(b=>b.addEventListener('click',e=>{e.preventDefault();handlers.onToggle&&handlers.onToggle(b.dataset.tg);}));
  container.querySelectorAll('[data-sel]').forEach(b=>b.addEventListener('click',e=>{e.preventDefault();handlers.onSelect&&handlers.onSelect(b.dataset.sel);}));
  container.querySelectorAll('[data-ck]').forEach(c=>c.addEventListener('change',()=>{handlers.onCheck&&handlers.onCheck(c.dataset.ck,c.checked);}));
}

// Only run syncCheckboxIndeterminate when there ARE checked nodes (fast path = skip)
function syncIndeterminate(container,tree,checkedSet){
  if(!container)return;
  const ordered=[];
  (function walk(list){(list||[]).forEach(n=>{ordered.push(n);walk(n.children||[]);});})(tree);
  ordered.reverse().forEach(node=>{
    const kids=node.children||[];if(!kids.length)return;
    const el=container.querySelector(`input[data-ck="${CSS.escape(node.id)}"]`);if(!el)return;
    const subIds=[];kids.forEach(k=>collectSubIdsFor(tree,k.id).forEach(id=>subIds.push(id)));
    const allChecked=subIds.length>0&&subIds.every(id=>checkedSet.has(id));
    el.indeterminate=false;
    el.checked=allChecked;
    if(allChecked)checkedSet.add(node.id);
    else checkedSet.delete(node.id);
  });
}
